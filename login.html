<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:black;
color:white;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
line-height:1.5;
}

.card{
background: linear-gradient(145deg, #111, #0a0a0a);
margin:15px;
padding:18px;
border-radius:16px;

/* subtle border */
border:1px solid #1f1f1f;

/* premium depth */
box-shadow: 
0 4px 20px rgba(0,0,0,0.6),
inset 0 0 0 1px rgba(255,255,255,0.02);

}

/* slight lift on hover/touch */
.card:active{
transform: scale(0.98);
}

input{
width:100%;
padding:14px;
margin-top:10px;
background:#000;
border:1px solid #333;
color:white;
border-radius:10px;
}

.btn{
background:white;
color:black;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:600;
cursor:pointer;

/* NEW */
/* Smooth feel */
*{
transition: all 0.25s ease;
}

/* Fade animation */
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Spin loader */
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
}

.btn:active{
transform: scale(0.95);
opacity:0.85;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
letter-spacing:0.5px;
border-bottom:1px solid #1a1a1a;
background:#000;
position:sticky;
top:0;
z-index:10;
}

/* section titles */
.title{
font-size:15px;
color:#aaa;
margin-bottom:8px;
}

/* main text */
.value{
font-size:16px;
font-weight:500;
}

/* small text */
.sub{
font-size:13px;
color:#777;
}

/* spacing improvement */
.section{
margin-top:22px;
}

/* 🔥 UNIVERSAL CLICK FEEDBACK */

button, .card, .option, .tab, .btn {
transition: all 0.15s ease;
cursor: pointer;
}

/* TAP EFFECT */
button:active, 
.card:active, 
.option:active, 
.tab:active, 
.btn:active {
transform: scale(0.96);
opacity: 0.85;
}

/* HOVER (for laptop) */
button:hover, 
.card:hover, 
.option:hover {
background:#1a1a1a;
}

</style>
</head>

<body>

<h2>Welcome to Mechzzy</h2>

<div class="card">

<div>Select Role</div>

<select id="role" style="width:100%;padding:12px;margin-top:10px;">
<option value="customer">Customer</option>
<option value="mechanic">Mechanic</option>
</select>

<input id="name" placeholder="Your name">
<input id="phone" placeholder="Phone number">

<button onclick="login()">Continue</button>

</div>

<script>
function login(){

let role = document.getElementById("role").value
let name = document.getElementById("name").value
let phone = document.getElementById("phone").value

if(!name || !phone){
alert("Enter all details")
return
}

localStorage.setItem("role", role)
localStorage.setItem("name", name)
localStorage.setItem("phone", phone)

if(role=="mechanic"){
localStorage.setItem("mechanicName", name)
localStorage.setItem("mechanicPhone", phone)
location.href="mechanic-home.html"
}else{
location.href="customer-home.html"
}

}
</script>

</body>
</html>
