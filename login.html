<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

.container{
padding:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:10px;
background:#111;
border:1px solid #222;
color:white;
border-radius:10px;
}

button{
width:100%;
padding:14px;
background:white;
color:black;
border:none;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

<input id="phone" placeholder="Phone number">

<button onclick="sendOTP()">Send OTP</button>

<div id="otpBox" style="display:none">
<input id="otp" placeholder="Enter OTP">
<button onclick="verify()">Verify</button>
</div>

</div>

<script>

let generated

function sendOTP(){

generated = Math.floor(1000 + Math.random()*9000)

alert("OTP: "+generated)

otpBox.style.display="block"

}

function verify(){

let entered = otp.value
let role = localStorage.getItem("role")

if(entered == generated){

localStorage.setItem("user",phone.value)

if(role=="customer"){
location.href="customer.html"
}else{
location.href="mechanic.html"
}

}else{
alert("Wrong OTP")
}

}

</script>

</body>
</html>
