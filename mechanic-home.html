<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanic Dashboard</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
padding-bottom:70px;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #1a1a1a;
}

.card{
background:#111;
margin:15px;
padding:18px;
border-radius:16px;
border:1px solid #1f1f1f;
}

.card:active{
transform:scale(0.96);
}

.btn{
background:#fff;
color:#000;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:600;
margin-top:10px;
}

.btn:active{
transform:scale(0.95);
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:13px;
cursor:pointer;
}

.tab.active{
color:#fff;
font-weight:600;
}
</style>
</head>

<body>

<div class="header">Mechanic</div>

<div id="requests"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

let requests = document.getElementById("requests")

// ✅ USER DATA
let userId = localStorage.getItem("mechanicPhone")
let mechanicName = localStorage.getItem("mechanicName")

if(!userId){
alert("Login again")
location.href = "mechanic-login.html"
}

// ✅ SET ONLINE
db.ref("mechanics/" + userId).update({
online: true,
name: mechanicName
})

let activeRequestId = null

// 🚀 LOCATION TRACKING
navigator.geolocation.watchPosition(pos => {

let lat = pos.coords.latitude
let lng = pos.coords.longitude

// update mechanic location
db.ref("mechanics/" + userId).update({
lat: lat,
lng: lng,
online: true
})

// update active job
if(activeRequestId){
db.ref("requests/" + activeRequestId).update({
mechLat: lat,
mechLng: lng
})
}

}, err=>{
console.log("Location error", err)
})

// 🚀 SHOW ONLY ASSIGNED REQUESTS
db.ref("requests").on("value",snap=>{

requests.innerHTML=""

let found = false

snap.forEach(child=>{

let id = child.key
let d = child.val()

// ONLY show requests assigned to this mechanic
if(d.assignedMechanic === userId){

found = true

requests.innerHTML += `
<div class="card">

<b>${d.vehicle}</b><br>
Issue: ${d.problem}

<div style="margin-top:10px;color:#aaa;">
Status: ${d.status}
</div>

${
d.status === "searching" ? 
`<div class="btn" onclick="accept('${id}')">Accept</div>` 
: ""
}

</div>
`
}

})

if(!found){
requests.innerHTML = `
<div class="card">
No assigned requests
</div>
`
}

})

// 🚀 ACCEPT REQUEST
function accept(id){

activeRequestId = id

db.ref("requests/" + id).update({
status:"accepted",
mechanicName: mechanicName,
mechanicPhone: userId
})

location.href = "mechanic.html"

}

</script>

<div class="bottom">
<div class="tab active">Requests</div>
<div class="tab" onclick="location.href='mechanic-activity.html'">Activity</div>
<div class="tab" onclick="location.href='mechanic-account.html'">Account</div>
</div>

</body>
</html>
