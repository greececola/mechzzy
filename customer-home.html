<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
padding-bottom:70px;
line-height:1.5;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
letter-spacing:0.5px;
border-bottom:1px solid #1a1a1a;
background:#000;
position:sticky;
top:0;
z-index:10;
}

.card{
background: linear-gradient(145deg, #111, #0a0a0a);
margin:15px;
padding:18px;
border-radius:16px;

/* subtle border */
border:1px solid #1f1f1f;

/* premium depth */
box-shadow: 
0 4px 20px rgba(0,0,0,0.6),
inset 0 0 0 1px rgba(255,255,255,0.02);

/* Smooth feel */
*{
transition: all 0.25s ease;
}

/* Fade animation */
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Spin loader */
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
}

/* slight lift on hover/touch */
.card:active{
transform: scale(0.98);
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:13px;
cursor:pointer;
}

.tab.active{
color:#fff;
font-weight:600;
}

/* section titles */
.title{
font-size:15px;
color:#aaa;
margin-bottom:8px;
}

/* main text */
.value{
font-size:16px;
font-weight:500;
}

/* small text */
.sub{
font-size:13px;
color:#777;
}

/* spacing improvement */
.section{
margin-top:22px;
}

/* 🔥 UNIVERSAL CLICK FEEDBACK */

button, .card, .option, .tab, .btn {
transition: all 0.15s ease;
cursor: pointer;
}

/* TAP EFFECT */
button:active, 
.card:active, 
.option:active, 
.tab:active, 
.btn:active {
transform: scale(0.96);
opacity: 0.85;
}

/* HOVER (for laptop) */
button:hover, 
.card:hover, 
.option:hover {
background:#1a1a1a;
}

/* 🔥 STRONG CLICK FEEDBACK */

button, .card, .option, .tab, .btn {
transition: all 0.15s ease;
cursor: pointer;
}

/* 🔥 STRONG PRESS EFFECT */
button:active,
.card:active,
.option:active,
.tab:active,
.btn:active {
transform: scale(0.94);
background:#2a2a2a !important;
border:1px solid #fff !important;
}

/* 🔥 SELECTED STATE (IMPORTANT) */
.active {
background:#2a2a2a !important;
border:2px solid #fff !important;
transform: scale(1.05);
}

</style>
</head>

<body>

<div class="header" style="text-align:center; padding:15px 10px;">
  <div style="font-size:24px; font-weight:700; letter-spacing:1px;">MECHZZY</div>
  <div style="font-size:13px; color:#888; margin-top:2px;">
    Mechanic in Minutes
  </div>
</div>

<div class="card">
Select Vehicle<br><br>

<button onclick="selectVehicle('Car')">Car</button>
<button onclick="selectVehicle('Bike')">Bike</button>
<button onclick="selectVehicle('Scooty')">Scooty</button>
<button onclick="selectVehicle('Other')">Other</button>
</div>

<div class="card">
Select Problem<br><br>

<button onclick="selectProblem('Fuel')">Fuel</button>
<button onclick="selectProblem('Puncture')">Puncture</button>
<button onclick="selectProblem('Battery')">Battery</button>
<button onclick="selectProblem('Accident')">Accident</button>
<button onclick="selectProblem('Other')">Other</button>
</div>

<button onclick="request()">FIND MECHANIC NOW</button>

<script src="firebase.js"></script>

<script>

let vehicle=""
let problem=""

function selectVehicle(v){ vehicle=v }
function selectProblem(p){ problem=p }

navigator.geolocation.getCurrentPosition(pos=>{
window.lat = pos.coords.latitude
window.lng = pos.coords.longitude
})

function request(){

if(!vehicle || !problem){
alert("Select all")
return
}

let id = Date.now()
let pin = Math.floor(1000 + Math.random()*9000)

db.ref("requests/"+id).set({
vehicle:vehicle,
problem:problem,
lat:window.lat,
lng:window.lng,
status:"pending",
pin:pin,
mechanicName:"",
mechanicPhone:""
})

localStorage.setItem("requestId",id)
localStorage.setItem("pin",pin)
localStorage.setItem("vehicle",vehicle)
localStorage.setItem("issue",problem)

location.href="searching.html"

}

</script>

</body>
</html>
