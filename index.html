<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechzzy</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
width:90%;
max-width:400px;
}

.logo{
font-size:38px;
font-weight:700;
margin-bottom:10px;
}

.tag{
opacity:.7;
margin-bottom:40px;
}

.btn{
display:block;
width:100%;
padding:18px;
margin:12px 0;
border-radius:12px;
font-size:16px;
border:none;
cursor:pointer;
}

.primary{
background:#22c55e;
color:white;
}

.secondary{
background:#1e293b;
color:white;
border:1px solid #334155;
}

.footer{
position:fixed;
bottom:15px;
width:100%;
text-align:center;
font-size:12px;
opacity:.5;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">MECHZZY</div>
<div class="tag">Emergency Roadside Assistance</div>

<button class="btn primary" onclick="getHelp()">
🚨 Get Emergency Help
</button>

<button class="btn secondary" onclick="joinMechanic()">
🔧 Join as Mechanic
</button>

</div>

<div class="footer">
Fast • Nearby • Reliable
</div>

<script>
function getHelp(){
window.location.href="customer.html"
}

function joinMechanic(){
window.location.href="mechanic-login.html"
}
</script>

</body>
</html>
