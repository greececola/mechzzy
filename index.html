<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MECHZZY – Mechanic in Minutes</title>

<meta name="description" content="Get a mechanic instantly with MECHZZY. Roadside help for car, bike & emergencies.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:'Inter', sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

/* LOGO */
.logo{
font-size:32px;
font-weight:700;
letter-spacing:2px;
}

.tagline{
font-size:14px;
color:#888;
margin-top:6px;
}

/* LOADER */
.loader{
width:50px;
height:50px;
border:4px solid #222;
border-top:4px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-top:25px;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* SUBTEXT */
.status{
margin-top:15px;
font-size:13px;
color:#777;
}

</style>
</head>

<body>

<div class="logo">MECHZZY</div>
<div class="tagline">Mechanic in Minutes</div>

<div class="loader"></div>

<div class="status" id="statusText">
Starting...
</div>

<script>

// dynamic messages
let messages = [
"Checking login...",
"Preparing app...",
"Almost ready..."
]

let i = 0
let interval = setInterval(()=>{
document.getElementById("statusText").innerText = messages[i]
i = (i+1) % messages.length
},1000)

// redirect logic
setTimeout(()=>{

clearInterval(interval)

let role = localStorage.getItem("role")

if(role === "customer"){
location.href = "customer-home.html"
}
else if(role === "mechanic"){
location.href = "mechanic-home.html"
}
else{
location.href = "login.html"
}

},2000)

</script>

</body>
</html>
