<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechzzy</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Inter', sans-serif;
}

.splash{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.logo{
font-size:34px;
font-weight:700;
letter-spacing:6px;
}

.tag{
color:#aaa;
margin-top:10px;
}

.buttons{
position:absolute;
bottom:40px;
width:100%;
padding:20px;
box-sizing:border-box;
}

.btn{
width:100%;
padding:16px;
margin-bottom:10px;
border-radius:12px;
border:1px solid #222;
background:#111;
color:white;
font-size:16px;
}
</style>

</head>

<body>

<div class="splash">
<div class="logo">MECHZZY</div>
<div class="tag">Roadside Assistance</div>
</div>

<div class="buttons">

<button class="btn" onclick="customer()">
🚨 Continue as Customer
</button>

<button class="btn" onclick="mechanic()">
🔧 Login as Mechanic
</button>

</div>

<script>

function customer(){
window.location.href="customer.html"
}

function mechanic(){
window.location.href="mechanic-login.html"
}

</script>

</body>
</html>
