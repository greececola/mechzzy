<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

.center{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.logo{
font-size:36px;
letter-spacing:5px;
font-weight:700;
}

.tag{
color:#aaa;
margin-top:10px;
}

.buttons{
position:absolute;
bottom:40px;
width:100%;
padding:20px;
}

button{
width:100%;
padding:16px;
margin-bottom:10px;
background:#111;
border:1px solid #222;
color:white;
border-radius:12px;
}
</style>
</head>

<body>

<div class="center">
<div class="logo">MECHZZY</div>
<div class="tag">Roadside Assistance</div>
</div>

<div class="buttons">
<button onclick="login('customer')">Login as Customer</button>
<button onclick="login('mechanic')">Login as Mechanic</button>
</div>

<script>
function login(role){
localStorage.setItem("role",role)
window.location.href="login.html"
}
</script>

</body>
</html>
