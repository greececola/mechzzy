<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
background:black;
color:white;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
line-height:1.5;
}
.logo{
font-size:32px;
letter-spacing:5px;
}
.tag{
color:#aaa;
margin-top:10px;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
letter-spacing:0.5px;
border-bottom:1px solid #1a1a1a;
background:#000;
position:sticky;
top:0;
z-index:10;
}

/* section titles */
.title{
font-size:15px;
color:#aaa;
margin-bottom:8px;
}

/* main text */
.value{
font-size:16px;
font-weight:500;
}

/* small text */
.sub{
font-size:13px;
color:#777;
}

/* spacing improvement */
.section{
margin-top:22px;
}

/* Smooth feel */
*{
transition: all 0.25s ease;
}

/* Fade animation */
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Spin loader */
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:13px;
cursor:pointer;
}

.tab.active{
color:#fff;
font-weight:600;
}

</style>
</head>

<body>

<div class="logo">MECHZZY</div>
<div class="tag">Mechanic in Minutes</div>

<script>
setTimeout(()=>{

let role = localStorage.getItem("role")

if(role=="customer"){
location.href="customer.html"
}
else if(role=="mechanic"){
location.href="mechanic.html"
}
else{
location.href="login.html"
}

},2000)
</script>

</body>
</html>
