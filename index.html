<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
background:black;
color:white;
font-family:Inter;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}
.logo{
font-size:32px;
letter-spacing:5px;
}
.tag{
color:#aaa;
margin-top:10px;
}
</style>
</head>

<body>

<div class="logo">MECHZZY</div>
<div class="tag">Roadside Assistance</div>

<script>
setTimeout(()=>{

let role = localStorage.getItem("role")

if(role=="customer"){
window.location.replace("customer.html")
}

else if(role=="mechanic"){
window.location.replace("mechanic.html")
}

else{
window.location.replace("login.html")
}

},2000)
</script>

</body>
</html>
