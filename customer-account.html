<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
line-height:1.5;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #1a1a1a;
letter-spacing:0.5px;
background:#000;
position:sticky;
top:0;
z-index:10;
}

.profile{
text-align:center;
padding:25px 15px;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:#222;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin:auto;
}

.name{
margin-top:10px;
font-size:18px;
font-weight:600;
}

.phone{
color:#aaa;
font-size:14px;
margin-top:4px;
}

.card{
background: linear-gradient(145deg, #111, #0a0a0a);
margin:15px;
padding:18px;
border-radius:16px;

/* subtle border */
border:1px solid #1f1f1f;

/* premium depth */
box-shadow: 
0 4px 20px rgba(0,0,0,0.6),
inset 0 0 0 1px rgba(255,255,255,0.02);

}

/* Smooth feel */
*{
transition: all 0.25s ease;
}

/* Fade animation */
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Spin loader */
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* slight lift on hover/touch */
.card:active{
transform: scale(0.98);
}

.option{
padding:14px 0;
border-bottom:1px solid #222;
cursor:pointer;
}

.option:last-child{
border:none;
}

.logout{
background:white;
color:black;
text-align:center;
padding:14px;
margin:20px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

/* section titles */
.title{
font-size:15px;
color:#aaa;
margin-bottom:8px;
}

/* main text */
.value{
font-size:16px;
font-weight:500;
}

/* small text */
.sub{
font-size:13px;
color:#777;
}

/* spacing improvement */
.section{
margin-top:22px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:13px;
cursor:pointer;
}

.tab.active{
color:#fff;
font-weight:600;
}


</style>
</head>

<body>

<div class="header">Account</div>

<div class="profile">
<div class="avatar">👤</div>
<div class="name" id="name">User</div>
<div class="phone" id="phone">0000000000</div>
</div>

<div class="card">

<div class="option" onclick="location.href='customer-activity.html'">📜 My Requests</div>
<div class="option" onclick="alert('Coming soon')">💳 Payments</div>
<div class="option" onclick="alert('Support: mechzzy@gmail.com')">📞 Help & Support</div>
<div class="option" onclick="alert('Settings soon')">⚙️ Settings</div>

</div>

<div class="logout" onclick="logout()">
Logout
</div>

<script>

let name = localStorage.getItem("name") || "User"
let phone = localStorage.getItem("phone") || "0000000000"

if(!name || !phone){
location.href="login.html"
}

document.getElementById("name").innerText = name
document.getElementById("phone").innerText = phone

function logout(){
localStorage.clear()
location.href = "login.html"
}

</script>

</body>
</html>
