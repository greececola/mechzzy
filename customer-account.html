<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Inter;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #222;
}

.profile{
text-align:center;
padding:25px 15px;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:#222;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin:auto;
}

.name{
margin-top:10px;
font-size:18px;
font-weight:600;
}

.phone{
color:#aaa;
font-size:14px;
margin-top:4px;
}

.card{
background:#111;
margin:12px;
padding:16px;
border-radius:14px;
border:1px solid #222;
}

.option{
padding:14px 0;
border-bottom:1px solid #222;
cursor:pointer;
}

.option:last-child{
border:none;
}

.logout{
background:white;
color:black;
text-align:center;
padding:14px;
margin:20px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}
</style>
</head>

<body>

<div class="header">Account</div>

<div class="profile">
<div class="avatar">👤</div>
<div class="name" id="name">User</div>
<div class="phone" id="phone">0000000000</div>
</div>

<div class="card">

<div class="option">📜 My Requests</div>
<div class="option">💳 Payments</div>
<div class="option">📞 Help & Support</div>
<div class="option">⚙️ Settings</div>

</div>

<div class="logout" onclick="logout()">
Logout
</div>

<script>

let online = localStorage.getItem("online")
let job = localStorage.getItem("job")

// FIX: default values
if(!online){
online = "false"
localStorage.setItem("online","false")
}

if(!job){
job = "none"
localStorage.setItem("job","none")
}

let statusBox = document.getElementById("status")

if(online==="true"){
statusBox.innerText="Online"
}else{
statusBox.innerText="Offline"
}

// RESET UI
document.getElementById("jobBox").style.display="none"
document.getElementById("pinBox").style.display="none"
document.getElementById("doneBox").style.display="none"

// SHOW BASED ON STATE
if(job==="accepted"){
document.getElementById("jobBox").style.display="block"
}

if(job==="arrived"){
document.getElementById("pinBox").style.display="block"
}

if(job==="done"){
document.getElementById("doneBox").style.display="block"
}

// ACTIONS
function arrived(){
localStorage.setItem("job","arrived")
location.reload()
}

function complete(){
let pin=document.getElementById("pin").value

if(pin==="9451"){
localStorage.setItem("job","done")
location.reload()
}else{
alert("Wrong PIN")
}
}

</script>

</body>
</html>
