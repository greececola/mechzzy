<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanic Assigned</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Inter', sans-serif;
}

/* HEADER */
.header{
padding:18px;
border-bottom:1px solid #1a1a1a;
font-size:18px;
font-weight:600;
}

/* MAP */
#map{
height:250px;
}

/* STATUS */
.status-box{
padding:20px;
text-align:center;
}

.status-title{
font-size:20px;
font-weight:600;
}

.status-sub{
font-size:13px;
color:#888;
}

.eta{
margin-top:10px;
font-size:15px;
}

/* CARD */
.card{
background:#111;
margin:15px;
padding:16px;
border-radius:14px;
border:1px solid #222;
}

/* BUTTON */
.btn{
margin-top:10px;
padding:14px;
background:#fff;
color:#000;
border-radius:12px;
text-align:center;
font-weight:600;
}

.btn.secondary{
background:#222;
color:#fff;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:12px;
}

.tab.active{
color:#fff;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<div class="header">Mechanic Assigned</div>

<div id="map"></div>

<div class="status-box">
<div class="status-title" id="statusTitle">Connecting...</div>
<div class="status-sub" id="statusSub">Please wait</div>
<div class="eta" id="eta">--</div>
</div>

<div class="card">
<b id="mechName">Mechanic</b><br>
⭐ 4.7 • Nearby expert
</div>

<div class="card">
Issue: <span id="issue"></span>
</div>

<div class="card">
<div class="btn" onclick="call()">📞 Call Mechanic</div>
<div class="btn secondary">💬 Message</div>
</div>

<div class="bottom">
<div class="tab" onclick="location.href='customer-home.html'">🏠<br>Home</div>
<div class="tab active">🚗<br>Tracking</div>
<div class="tab" onclick="location.href='customer-activity.html'">📄<br>Activity</div>
<div class="tab" onclick="location.href='customer-account.html'">👤<br>Account</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

// role check
let role = localStorage.getItem("role")
if(role !== "customer"){
location.href = "login.html"
}

// load data
document.getElementById("issue").innerText = localStorage.getItem("issue")
let requestId = localStorage.getItem("requestId")

let map, userMarker, mechMarker

// get user location → init map
navigator.geolocation.getCurrentPosition(pos => {

let lat = pos.coords.latitude
let lng = pos.coords.longitude

map = L.map('map').setView([lat, lng], 15)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19
}).addTo(map)

userMarker = L.marker([lat, lng]).addTo(map)
.bindPopup("You").openPopup()

})

// listen Firebase
db.ref("requests/"+requestId).on("value",(snap)=>{

let d = snap.val()
if(!d) return

// mechanic name
document.getElementById("mechName").innerText =
d.mechanicName || "Mechanic"

// update status
if(d.status==="accepted"){
document.getElementById("statusTitle").innerText = "On the way"
document.getElementById("statusSub").innerText = "Mechanic heading to you"
}

if(d.status==="arrived"){
document.getElementById("statusTitle").innerText = "Arrived"
document.getElementById("statusSub").innerText = "Meet your mechanic"
}

// ✅ LIVE TRACKING (REAL)
if(d.mechLat && d.mechLng && map){

if(!mechMarker){
mechMarker = L.marker([d.mechLat, d.mechLng]).addTo(map)
.bindPopup("Mechanic")
}else{
mechMarker.setLatLng([d.mechLat, d.mechLng])
}

}

// completed → rating
if(d.status==="completed"){

document.body.innerHTML = `
<div style="padding:30px;text-align:center">

<h2>Rate your mechanic</h2>

<div id="stars" style="font-size:35px;margin:20px 0;">
<span onclick="rate(1)">⭐</span>
<span onclick="rate(2)">⭐</span>
<span onclick="rate(3)">⭐</span>
<span onclick="rate(4)">⭐</span>
<span onclick="rate(5)">⭐</span>
</div>

<div id="selected">Select rating</div>

<br>

<select id="solved">
<option value="yes">Solved</option>
<option value="no">Not solved</option>
</select>

<br><br>

<input id="feedback" placeholder="Feedback">

<br><br>

<button onclick="submitRating()">Submit</button>

</div>
`
}

})

// rating
let selectedRating = 0

function rate(n){
selectedRating = n
document.getElementById("selected").innerText = n + " stars"
}

// submit
function submitRating(){

db.ref("requests/"+requestId).update({
rating:selectedRating
})

location.href="customer-home.html"
}

// call
function call(){
let phone = localStorage.getItem("mechanicPhone")
if(phone){
window.location.href = "tel:"+phone
}
}

</script>

</body>
</html>
