<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter', sans-serif;
background:#000;
color:#fff;
padding-bottom:70px;
}

.header{
padding:18px;
font-weight:700;
font-size:20px;
border-bottom:1px solid #222;
}

.card{
background:#111;
border:1px solid #222;
border-radius:14px;
padding:16px;
margin:12px;
cursor:pointer;
}

.desc{
color:#aaa;
font-size:14px;
margin-top:4px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
border-top:1px solid #222;
}

.tab{
flex:1;
text-align:center;
padding:14px;
font-size:13px;
}
</style>
</head>

<body>

<div class="header">Mechzzy</div>

<div class="card" onclick="location='emergency.html'">
🚨 Emergency Help
<div class="desc">Find nearby mechanic immediately</div>
</div>

<div class="card">
📅 Schedule Service
<div class="desc">Coming soon</div>
</div>

<div class="card" onclick="location='customer-activity.html'">
📜 Request History
<div class="desc">View past requests</div>
</div>

<div class="bottom">
<div class="tab">🏠 Home</div>

<div class="tab" onclick="location='customer-activity.html'">
📊 Activity
</div>

<div class="tab" onclick="location='customer-account.html'">
👤 Account
</div>
</div>

</body>
</html>
