<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter', sans-serif;
background:#000;
color:#fff;
}

.header{
padding:18px;
font-weight:700;
font-size:20px;
border-bottom:1px solid #222;
}

.card{
background:#111;
border:1px solid #222;
border-radius:14px;
padding:16px;
margin:12px;
cursor:pointer;
}

.card:active{
background:#1a1a1a;
}

.desc{
color:#aaa;
font-size:14px;
margin-top:4px;
}
</style>
</head>

<body>

<div class="header">Mechzzy</div>

<div class="card" onclick="emergency()">
🚨 Emergency Help
<div class="desc">Find nearby mechanic immediately</div>
</div>

<div class="card" onclick="schedule()">
📅 Schedule Service
<div class="desc">Book mechanic for later</div>
</div>

<div class="card" onclick="history()">
📜 Request History
<div class="desc">View past service requests</div>
</div>

<script>

function emergency(){
window.location.href="emergency.html"
}

function schedule(){
alert("Coming soon")
}

function history(){
alert("Coming soon")
}

</script>

</body>
</html>
