<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Inter', sans-serif;
background:#000;
color:#fff;
}

.card{
background:#111;
border:1px solid #222;
border-radius:14px;
padding:16px;
margin:12px;
}

input{
width:100%;
padding:14px;
background:#111;
border:1px solid #222;
color:#fff;
border-radius:10px;
margin-bottom:10px;
}

button{
background:#fff;
color:#000;
border:none;
padding:14px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.secondary{
background:#111;
color:#fff;
border:1px solid #333;
}

.header{
padding:18px;
font-weight:700;
font-size:20px;
border-bottom:1px solid #222;
}

.desc{
color:#aaa;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">Mechzzy</div>

<div class="card" onclick="emergency()">
🚨 Emergency Help
<div class="desc">Find nearby mechanic immediately</div>
</div>

<div class="card">
📅 Schedule Service
<div class="desc">Book mechanic for later</div>
</div>

<div class="card">
📜 Request History
<div class="desc">View past service requests</div>
</div>

</body>
</html>
