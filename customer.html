<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
background:#000;
color:#fff;
padding-bottom:70px;
line-height:1.5;
}

.header{
padding:20px;
font-weight:600;
font-size:22px;
letter-spacing:0.5px;
border-bottom:1px solid #1a1a1a;
background:#000;
position:sticky;
top:0;
z-index:10;
}

.card{
background: linear-gradient(145deg, #111, #0a0a0a);
margin:15px;
padding:18px;
border-radius:16px;

/* subtle border */
border:1px solid #1f1f1f;

/* premium depth */
box-shadow: 
0 4px 20px rgba(0,0,0,0.6),
inset 0 0 0 1px rgba(255,255,255,0.02);

/* Smooth feel */
*{
transition: all 0.25s ease;
}

/* Fade animation */
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Spin loader */
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
}

/* slight lift on hover/touch */
.card:active{
transform: scale(0.98);
}

.desc{
color:#aaa;
font-size:14px;
margin-top:4px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:13px;
cursor:pointer;
}

.tab.active{
color:#fff;
font-weight:600;
}

.btn{
background:white;
color:black;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:600;
cursor:pointer;

/* NEW */
transition: all 0.15s ease;
}

.btn:active{
transform: scale(0.95);
opacity:0.85;
}

/* section titles */
.title{
font-size:15px;
color:#aaa;
margin-bottom:8px;
}

/* main text */
.value{
font-size:16px;
font-weight:500;
}

/* small text */
.sub{
font-size:13px;
color:#777;
}

/* spacing improvement */
.section{
margin-top:22px;
}

</style>
</head>

<body>

<div class="header">Mechzzy</div>

<div class="card" onclick="location='emergency.html'">
🚨 Emergency Help
<div class="desc">Find nearby mechanic immediately</div>
</div>

<div class="card">
📅 Schedule Service
<div class="desc">Coming soon</div>
</div>

<div class="card" onclick="location='customer-activity.html'">
📜 Request History
<div class="desc">View past requests</div>
</div>

<div class="bottom">
<div class="tab">🏠 Home</div>

<div class="tab" onclick="location='customer-activity.html'">
📊 Activity
</div>

<div class="tab" onclick="location='customer-account.html'">
👤 Account
</div>
</div>

<script>
let role = localStorage.getItem("role")

if(role !== "customer"){
location.href = "login.html"
}
</script>

</body>
</html>
