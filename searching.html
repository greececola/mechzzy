<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finding Mechanic</title>

<style>
body{
background:black;
color:white;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
margin:0;
padding:0;
line-height:1.5;
}

.container{
padding:20px;
}

.title{
font-size:15px;
font-weight:600;
margin-top:22px;
margin-bottom:8px;
color:#aaa;
}

.sub{
color:#777;
margin-top:5px;
font-size:13px;
}

.loader{
width:60px;
height:60px;
border:4px solid #222;
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin:40px auto;
}

.card{
background: linear-gradient(145deg, #111, #0a0a0a);
margin:15px;
padding:18px;
border-radius:16px;

/* subtle border */
border:1px solid #1f1f1f;

/* premium depth */
box-shadow: 
0 4px 20px rgba(0,0,0,0.6),
inset 0 0 0 1px rgba(255,255,255,0.02);

}

/* slight lift on hover/touch */
.card:active{
transform: scale(0.98);
}

/* animation */
/* Smooth feel */
*{
transition: all 0.25s ease;
}

/* Fade animation */
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Spin loader */
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}


/* slight lift on hover/touch */
.card:active{
transform: scale(0.98);
}

.label{
color:gray;
font-size:13px;
}

.value{
margin-top:4px;
font-size:16px;
font-weight:500;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:13px;
cursor:pointer;
}

.tab.active{
color:#fff;
font-weight:600;
}

.pin{
font-size:28px;
letter-spacing:8px;
margin-top:10px;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
letter-spacing:0.5px;
border-bottom:1px solid #1a1a1a;
background:#000;
position:sticky;
top:0;
z-index:10;
}

/* spacing improvement */
.section{
margin-top:22px;
}


</style>
</head>

<body>

<div class="container">

<div class="title">Finding nearby mechanic</div>
<div class="sub">Please wait while we connect you</div>

<div class="loader"></div>

<div class="card">
<div class="label">Vehicle</div>
<div class="value" id="vehicle">Car</div>
</div>

<div class="card">
<div class="label">Issue</div>
<div class="value" id="issue">Battery</div>
</div>

<div class="card">
<div class="label">Location</div>
<div class="value" id="location">Fetching location...</div>
</div>

</div>

<div class="card" style="text-align:center;margin:15px">
Share PIN with mechanic
<div class="pin" id="pin">----</div>
</div>

<div style="margin-top:15px;text-align:center">
<button onclick="cancel()" style="
padding:12px;
background:#222;
color:white;
border:none;
border-radius:8px;
">
Cancel Request
</button>
</div>

<script>
let role = localStorage.getItem("role")

if(role !== "customer"){
location.href = "login.html"
}
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

// get from previous page
document.getElementById("vehicle").innerText =
localStorage.getItem("vehicle")

document.getElementById("issue").innerText =
localStorage.getItem("issue")

// show pin
const pin = localStorage.getItem("pin")
document.getElementById("pin").innerText = pin

// location
navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude
let lng = pos.coords.longitude

document.getElementById("location").innerText =
lat.toFixed(4) + ", " + lng.toFixed(4)

})

// listen mechanic accept
let id = localStorage.getItem("requestId")

db.ref("requests/"+id).on("value",(snap)=>{

let r = snap.val()
if(!r) return

// 🔴 STILL SEARCHING
if(r.status == "pending"){
// nothing
}

// 🟢 ACCEPTED
if(r.status == "accepted"){

localStorage.setItem("mechanicName", r.mechanicName)
localStorage.setItem("mechanicPhone", r.mechanicPhone)

location.href = "assigned.html"

}

})
// cancel request
function cancel(){

let id = localStorage.getItem("requestId")

db.ref("requests/"+id).update({
status:"cancelled"
})

location.href="customer.html"

}

</script>

</body>
</html>
