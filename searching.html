<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finding Mechanic</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:'Inter', sans-serif;
}

.header{
padding:18px;
border-bottom:1px solid #1a1a1a;
font-size:18px;
font-weight:600;
}

.center{
text-align:center;
padding:30px 20px;
}

.title{
font-size:20px;
font-weight:600;
}

.sub{
font-size:13px;
color:#888;
margin-top:6px;
}

.loader{
width:80px;
height:80px;
border:5px solid #222;
border-top:5px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite;
margin:30px auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.status{
font-size:14px;
color:#aaa;
margin-top:10px;
}

.card{
background:#111;
margin:15px;
padding:16px;
border-radius:14px;
border:1px solid #222;
}

.label{
color:#777;
font-size:12px;
}

.value{
font-size:15px;
margin-top:4px;
}

.pin-box{
background:#111;
margin:15px;
padding:16px;
border-radius:14px;
text-align:center;
border:1px solid #222;
}

.pin{
font-size:28px;
letter-spacing:8px;
margin-top:10px;
}

.cancel{
margin:20px;
padding:14px;
text-align:center;
border-radius:12px;
background:#222;
color:#fff;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:12px;
}

.tab.active{
color:#fff;
}
</style>
</head>

<body>

<div class="header">Finding Mechanic</div>

<div class="center">
<div class="title">Searching nearby mechanics</div>
<div class="sub">Please wait while we connect you</div>

<div class="loader"></div>

<div class="status" id="statusText">
Looking for available mechanics...
</div>
</div>

<div class="card">
<div class="label">Vehicle</div>
<div class="value" id="vehicle"></div>
</div>

<div class="card">
<div class="label">Issue</div>
<div class="value" id="issue"></div>
</div>

<div class="card">
<div class="label">Location</div>
<div class="value" id="location">Fetching location...</div>
</div>

<div class="pin-box">
Share this PIN with mechanic
<div class="pin" id="pin">----</div>
</div>

<div class="cancel" onclick="cancel()">Cancel Request</div>

<div class="bottom">
<div class="tab" onclick="location.href='customer-home.html'">🏠<br>Home</div>
<div class="tab active">🔍<br>Searching</div>
<div class="tab" onclick="location.href='customer-activity.html'">📄<br>Activity</div>
<div class="tab" onclick="location.href='customer-account.html'">👤<br>Account</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

// 🔐 ROLE CHECK
let role = localStorage.getItem("role")
if(role !== "customer"){
location.href = "login.html"
}

// 🔐 REQUEST ID CHECK
let id = localStorage.getItem("requestId")
if(!id){
alert("Session expired")
location.href = "customer-home.html"
}

// show details
document.getElementById("vehicle").innerText = localStorage.getItem("vehicle") || "-"
document.getElementById("issue").innerText = localStorage.getItem("issue") || "-"
document.getElementById("pin").innerText = localStorage.getItem("pin") || "----"

// 📍 LOCATION
navigator.geolocation.getCurrentPosition(pos=>{
let lat = pos.coords.latitude.toFixed(4)
let lng = pos.coords.longitude.toFixed(4)

document.getElementById("location").innerText = lat + ", " + lng
}, ()=>{
document.getElementById("location").innerText = "Location unavailable"
})

// 🔄 STATUS ANIMATION
let messages = [
"Looking for nearby mechanics...",
"Checking availability...",
"Connecting to mechanic...",
"Almost there..."
]

let i = 0
let statusInterval = setInterval(()=>{
document.getElementById("statusText").innerText = messages[i]
i = (i+1) % messages.length
},2000)

// ⏳ TIMEOUT (fallback)
setTimeout(()=>{
document.getElementById("statusText").innerText =
"Still searching... please wait or try again"
},15000)

// 🔥 FIREBASE LISTENER
db.ref("requests/"+id).on("value",(snap)=>{

let r = snap.val()
if(!r) return

// accepted
if(r.status == "accepted"){

clearInterval(statusInterval)

document.getElementById("statusText").innerText =
"Mechanic found!"

localStorage.setItem("mechanicName", r.mechanicName)
localStorage.setItem("mechanicPhone", r.mechanicPhone)

setTimeout(()=>{
location.href = "assigned.html"
},800)

}

// no mechanic
if(r.status == "cancelled"){
alert("Request cancelled")
location.href = "customer-home.html"
}

})

// ❌ CANCEL
function cancel(){
db.ref("requests/"+id).update({
status:"cancelled"
})
location.href="customer-home.html"
}

</script>

</body>
</html>
