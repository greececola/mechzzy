<!DOCTYPE html>
<html>
<head>
<title>Mechzzy Mechanic Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter', sans-serif;
background:#000;
color:#fff;
}

.header{
padding:20px;
font-size:22px;
font-weight:700;
border-bottom:1px solid #222;
}

.container{
padding:16px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:14px;
padding:16px;
}

input{
width:100%;
padding:14px;
margin-bottom:10px;
background:#000;
border:1px solid #222;
color:white;
border-radius:10px;
}

button{
width:100%;
padding:14px;
background:white;
color:black;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.subtitle{
color:#aaa;
margin-bottom:15px;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
Mechanic Login
</div>

<div class="container">

<div class="card">

<div class="subtitle">
Go online and receive nearby requests
</div>

<input id="name" placeholder="Your name">
<input id="phone" placeholder="Phone number">

<button onclick="login()">
Go Online
</button>

</div>

</div>

<script>

function login(){

const name=document.getElementById("name").value
const phone=document.getElementById("phone").value

if(!name || !phone){
alert("Enter all details")
return
}

localStorage.setItem("role","mechanic")
localStorage.setItem("mechanicName",name)
localStorage.setItem("mechanicPhone",phone)

window.location.href="mechanic.html"

}

</script>

</body>
</html>
