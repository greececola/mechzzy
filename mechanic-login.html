<!DOCTYPE html>
<html>
<head>
<title>Mechzzy Mechanic Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
background:#000;
color:#fff;
line-height:1.5;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
letter-spacing:0.5px;
border-bottom:1px solid #1a1a1a;
background:#000;
position:sticky;
top:0;
z-index:10;
}

.container{
padding:16px;
}

.card{
background: linear-gradient(145deg, #111, #0a0a0a);
margin:15px;
padding:18px;
border-radius:16px;

/* subtle border */
border:1px solid #1f1f1f;

/* premium depth */
box-shadow: 
0 4px 20px rgba(0,0,0,0.6),
inset 0 0 0 1px rgba(255,255,255,0.02);

}

/* slight lift on hover/touch */
.card:active{
transform: scale(0.98);
}

input{
width:100%;
padding:14px;
margin-bottom:10px;
background:#000;
border:1px solid #222;
color:white;
border-radius:10px;
}

.btn{
background:white;
color:black;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:600;
cursor:pointer;

/* NEW */
/* Smooth feel */
*{
transition: all 0.25s ease;
}

/* Fade animation */
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Spin loader */
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
}

.btn:active{
transform: scale(0.95);
opacity:0.85;
}

.subtitle{
color:#aaa;
margin-bottom:15px;
font-size:14px;
}

/* section titles */
.title{
font-size:15px;
color:#aaa;
margin-bottom:8px;
}

/* main text */
.value{
font-size:16px;
font-weight:500;
}

/* small text */
.sub{
font-size:13px;
color:#777;
}

/* spacing improvement */
.section{
margin-top:22px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:13px;
cursor:pointer;
}

.tab.active{
color:#fff;
font-weight:600;
}

/* 🔥 UNIVERSAL CLICK FEEDBACK */

button, .card, .option, .tab, .btn {
transition: all 0.15s ease;
cursor: pointer;
}

/* TAP EFFECT */
button:active, 
.card:active, 
.option:active, 
.tab:active, 
.btn:active {
transform: scale(0.96);
opacity: 0.85;
}

/* HOVER (for laptop) */
button:hover, 
.card:hover, 
.option:hover {
background:#1a1a1a;
}

/* 🔥 STRONG CLICK FEEDBACK */

button, .card, .option, .tab, .btn {
transition: all 0.15s ease;
cursor: pointer;
}

/* 🔥 STRONG PRESS EFFECT */
button:active,
.card:active,
.option:active,
.tab:active,
.btn:active {
transform: scale(0.94);
background:#2a2a2a !important;
border:1px solid #fff !important;
}

/* 🔥 SELECTED STATE (IMPORTANT) */
.active {
background:#2a2a2a !important;
border:2px solid #fff !important;
transform: scale(1.05);
}

</style>
</head>

<body>

<div class="header">
Mechanic Login
</div>

<div class="container">

<div class="card">

<div class="subtitle">
Go online and receive nearby requests
</div>

<input id="name" placeholder="Your name">
<input id="phone" placeholder="Phone number">

<button onclick="login()">
Go Online
</button>

</div>

</div>

<script>

function login(){

const name=document.getElementById("name").value
const phone=document.getElementById("phone").value

if(!name || !phone){
alert("Enter all details")
return
}

localStorage.setItem("role","mechanic")
localStorage.setItem("mechanicName",name)
localStorage.setItem("mechanicPhone",phone)

window.location.href="mechanic.html"

}

</script>

</body>
</html>
