<!DOCTYPE html>
<html>
<head>
<title>Mechzzy Mechanic Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.header{
padding:20px;
text-align:center;
font-weight:700;
border-bottom:1px solid #1e293b;
}

.container{
padding:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:16px;
border:1px solid #1e293b;
}

input{
width:100%;
padding:14px;
margin-bottom:10px;
border-radius:10px;
border:none;
background:#020617;
color:white;
border:1px solid #1e293b;
}

button{
width:100%;
padding:14px;
background:#22c55e;
color:white;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

.subtitle{
opacity:.6;
margin-bottom:15px;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
Mechanic Login
</div>

<div class="container">

<div class="card">

<div class="subtitle">
Go online and receive nearby requests
</div>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<button onclick="login()">
Go Online
</button>

</div>

</div>

<script>

function login(){

const name=document.getElementById("name").value
const phone=document.getElementById("phone").value

if(!name || !phone){
alert("Enter all details")
return
}

localStorage.setItem("mechName",name)
localStorage.setItem("mechPhone",phone)

window.location.href="mechanic.html"

}

</script>

</body>
</html>
