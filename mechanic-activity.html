<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanic Activity</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
padding-bottom:70px;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #1a1a1a;
}

.card{
background:#111;
margin:15px;
padding:18px;
border-radius:16px;
border:1px solid #1f1f1f;
}

.status{
margin-top:6px;
color:#4caf50;
font-size:13px;
}

.rating{
margin-top:10px;
font-size:14px;
color:#ccc;
line-height:1.5;
}

.empty{
text-align:center;
margin-top:40px;
color:#777;
}

.loading{
text-align:center;
margin-top:40px;
color:#555;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:12px;
}

.tab.active{
color:#fff;
font-weight:600;
}
</style>
</head>

<body>

<div class="header">My Activity</div>

<div id="activityList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

// 🔐 ROLE CHECK
let role = localStorage.getItem("role")
if(role !== "mechanic"){
location.href = "mechanic-login.html"
}

// ✅ USE UNIQUE ID (PHONE)
let mechanicPhone = localStorage.getItem("mechanicPhone")

if(!mechanicPhone){
alert("Login again")
location.href = "mechanic-login.html"
}

let container = document.getElementById("activityList")

// loading state
container.innerHTML = `<div class="loading">Loading...</div>`

// 🔥 LISTEN
db.ref("requests").on("value", (snapshot)=>{

let data = snapshot.val()

container.innerHTML = ""

if(!data){
container.innerHTML = `<div class="empty">No data available</div>`
return
}

let found = false

for(let id in data){

let req = data[id]

// ✅ FILTER THIS MECHANIC ONLY
if(req.mechanicPhone !== mechanicPhone) continue

// ✅ ONLY COMPLETED
if(req.status !== "completed") continue

found = true

container.innerHTML += `
<div class="card">

<b>${req.vehicle || req.vehicleType || "Vehicle"}</b><br>
Issue: ${req.problem || req.problemType || "-"}

<div class="status">Completed ✅</div>

<div class="rating">
⭐ Rating: ${req.rating || "Not rated"} <br>
👍 Solved: ${
req.solved === true ? "Yes" :
req.solved === false ? "No" : "N/A"
} <br>
💬 ${req.feedback || ""}
</div>

</div>
`
}

if(!found){
container.innerHTML = `
<div class="empty">
No completed jobs yet
</div>
`
}

})

</script>

<div class="bottom">
<div class="tab" onclick="location.href='mechanic-home.html'">🏠<br>Home</div>
<div class="tab active">📄<br>Activity</div>
<div class="tab" onclick="location.href='mechanic-account.html'">👤<br>Account</div>
</div>

</body>
</html>
