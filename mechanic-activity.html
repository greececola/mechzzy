<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Inter;
}

/* smooth feel */
*{
transition:all 0.25s ease;
}

.header{
padding:18px;
font-size:20px;
border-bottom:1px solid #222;
}

/* cards */
.card{
background:#111;
margin:12px;
padding:16px;
border-radius:14px;
border:1px solid #222;
animation:fade 0.4s ease;
}

.title{
font-size:16px;
font-weight:600;
}

.sub{
color:#aaa;
font-size:14px;
margin-top:4px;
}

.status{
margin-top:10px;
font-size:13px;
color:#0f5132;
}

/* animation */
@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="header">Activity</div>

<div id="list"></div>

<script>

//////////////////////////////
// ROLE PROTECTION
//////////////////////////////
let role = localStorage.getItem("role")

if(role !== "mechanic"){
location.href = "login.html"
}

//////////////////////////////
// GET LIST ELEMENT ✅
//////////////////////////////
let list = document.getElementById("list")

//////////////////////////////
// FIREBASE
//////////////////////////////
var firebaseConfig = {
apiKey: "AIzaSyBRb3bcxCdIlOUA74TNw1hdrxfzGv-67DU",
authDomain: "mechzzy.firebaseapp.com",
databaseURL: "https://mechzzy-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "mechzzy"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

//////////////////////////////
// GET MECHANIC NAME (SAFE)
//////////////////////////////
let mechanicName = localStorage.getItem("name") // FIXED

//////////////////////////////
// LOAD DATA
//////////////////////////////
db.ref("requests").on("value",snap=>{

list.innerHTML=""

snap.forEach(child=>{

let d = child.val()

if(d.status!="completed") return
if(d.mechanicName!=mechanicName) return

list.innerHTML+=`

<div class="card">

<div class="title">${d.vehicle}</div>
<div class="sub">Issue: ${d.problem}</div>

<div class="status">
✅ Completed
</div>

</div>

`

})

//////////////////////////////
// EMPTY STATE
//////////////////////////////
if(list.innerHTML==""){
list.innerHTML="<div class='card'>No activity yet</div>"
}

})

</script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</body>
</html>
