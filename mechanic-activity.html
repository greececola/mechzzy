<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
padding-bottom:70px;
line-height:1.5;
}

/* Smooth feel */
*{
transition: all 0.25s ease;
}

/* Fade animation */
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Spin loader */
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
letter-spacing:0.5px;
border-bottom:1px solid #1a1a1a;
background:#000;
position:sticky;
top:0;
z-index:10;
}

/* cards */
.card{
background: linear-gradient(145deg, #111, #0a0a0a);
margin:15px;
padding:18px;
border-radius:16px;

/* subtle border */
border:1px solid #1f1f1f;

/* premium depth */
box-shadow: 
0 4px 20px rgba(0,0,0,0.6),
inset 0 0 0 1px rgba(255,255,255,0.02);

}

/* slight lift on hover/touch */
.card:active{
transform: scale(0.98);
}

.title{
font-size:15px;
font-weight:600;
color:#aaa;
margin-bottom:8px;
}

.sub{
font-size:13px;
color:#777;
margin-top:4px;
}

.status{
margin-top:10px;
font-size:13px;
color:#0f5132;
}

/* main text */
.value{
font-size:16px;
font-weight:500;
}

/* spacing improvement */
.section{
margin-top:22px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:13px;
cursor:pointer;
}

.tab.active{
color:#fff;
font-weight:600;
}

/* 🔥 UNIVERSAL CLICK FEEDBACK */

button, .card, .option, .tab, .btn {
transition: all 0.15s ease;
cursor: pointer;
}

/* TAP EFFECT */
button:active, 
.card:active, 
.option:active, 
.tab:active, 
.btn:active {
transform: scale(0.96);
opacity: 0.85;
}

/* HOVER (for laptop) */
button:hover, 
.card:hover, 
.option:hover {
background:#1a1a1a;
}

</style>
</head>

<body>

<div class="header">Activity</div>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

let role = localStorage.getItem("role")
if(role!=="mechanic") location.href="login.html"

let list=document.getElementById("list")

let mechanicName = localStorage.getItem("mechanicName")

db.ref("requests").on("value",snap=>{

list.innerHTML=""

snap.forEach(child=>{

let d=child.val()

if(d.status!="completed") return
if(d.mechanicName!=mechanicName) return

list.innerHTML+=`
<div class="card">
<b>${d.vehicle}</b><br>
Issue: ${d.problem}
<div class="status">Completed</div>
</div>
`

})

if(list.innerHTML==""){
list.innerHTML=`
<div class="card fade" style="text-align:center">

<div style="font-size:16px;margin-bottom:6px">
No completed jobs
</div>

<div style="color:#777;font-size:13px">
Your completed services will appear here
</div>

</div>
`
}

})

</script>
</body>
</html>
