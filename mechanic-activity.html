<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Inter;
}

/* smooth feel */
*{
transition:all 0.25s ease;
}

.header{
padding:18px;
font-size:20px;
border-bottom:1px solid #222;
}

/* cards */
.card{
background:#111;
margin:12px;
padding:16px;
border-radius:14px;
border:1px solid #222;
animation:fade 0.4s ease;
}

.title{
font-size:16px;
font-weight:600;
}

.sub{
color:#aaa;
font-size:14px;
margin-top:4px;
}

.status{
margin-top:10px;
font-size:13px;
color:#0f5132;
}

/* animation */
@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="header">Activity</div>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

let role = localStorage.getItem("role")
if(role!=="mechanic") location.href="login.html"

let list=document.getElementById("list")

let mechanicName = localStorage.getItem("mechanicName")

db.ref("requests").on("value",snap=>{

list.innerHTML=""

snap.forEach(child=>{

let d=child.val()

if(d.status!="completed") return
if(d.mechanicName!=mechanicName) return

list.innerHTML+=`
<div class="card">
<b>${d.vehicle}</b><br>
Issue: ${d.problem}
<div class="status">Completed</div>
</div>
`

})

if(list.innerHTML==""){
list.innerHTML="<div class='card'>No activity</div>"
}

})

</script>
</body>
</html>
