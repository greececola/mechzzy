<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Inter;
padding-bottom:70px;
}

.header{
padding:18px;
font-size:20px;
border-bottom:1px solid #222;
}

.toggle{
background:#111;
padding:12px;
margin:12px;
border-radius:10px;
text-align:center;
border:1px solid #222;
cursor:pointer;
}

.online{
background:#065f46;
}

.card{
background:#111;
margin:12px;
padding:16px;
border-radius:12px;
border:1px solid #222;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:white;
color:black;
border:none;
border-radius:8px;
}

input{
margin-top:10px;
padding:12px;
width:100%;
background:#000;
border:1px solid #333;
color:white;
border-radius:8px;
}
</style>
</head>

<body>

<div class="header">Mechanic</div>

<div class="toggle" onclick="toggleOnline()" id="toggle">
Offline
</div>

<div id="requests"></div>

<audio id="sound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<!-- ✅ ROLE PROTECTION -->
<script>
if(localStorage.getItem("role") !== "mechanic"){
location.href="login.html"
}
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBRb3bcxCdIlOUA74TNw1hdrxfzGv-67DU",
authDomain: "mechzzy.firebaseapp.com",
databaseURL: "https://mechzzy-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "mechzzy"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let online = false
let listener = null

let myLat = null
let myLng = null

navigator.geolocation.getCurrentPosition(pos=>{
myLat = pos.coords.latitude
myLng = pos.coords.longitude
})

// get mechanic info
let mechanicName = localStorage.getItem("mechanicName")
let mechanicPhone = localStorage.getItem("mechanicPhone")

if(!mechanicName || !mechanicPhone){
alert("Please login again")
location.href="login.html"
}

// distance formula
function distance(lat1, lon1, lat2, lon2){

var R = 6371
var dLat = (lat2-lat1) * Math.PI/180
var dLon = (lon2-lon1) * Math.PI/180

var a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2) *
Math.sin(dLon/2)

var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))
return R * c

}

function toggleOnline(){

online = !online

if(online){
toggle.innerText="Online"
toggle.classList.add("online")
listen()
}else{
toggle.innerText="Offline"
toggle.classList.remove("online")
requests.innerHTML=""

if(listener){
db.ref("requests").off("value",listener)
}
}

}

function listen(){

listener = db.ref("requests").on("value",snap=>{

if(!online) return

requests.innerHTML=""

snap.forEach(child=>{

let id = child.key
let d = child.val()

if(d.status!="pending") return
if(!d.lat || !d.lng || !myLat || !myLng) return

let dist = distance(myLat,myLng,d.lat,d.lng)

requests.innerHTML+=`
<div class="card">

<b>${d.vehicle}</b><br>
Issue: ${d.problem}<br>
Distance: ${dist.toFixed(1)} km

<button onclick="accept('${id}')">
Accept
</button>

</div>
`

})

if(requests.innerHTML==""){
requests.innerHTML="<div class='card'>No requests</div>"
}

})

}

function accept(id){

db.ref("requests/"+id).once("value",snap=>{

let data = snap.val()

if(data.status!="pending"){
alert("Already taken")
return
}

db.ref("requests/"+id).update({
status:"accepted",
mechanicName:mechanicName,
mechanicPhone:mechanicPhone,
mechLat:myLat,
mechLng:myLng
})

requests.innerHTML=`
<div class="card">

Heading to customer...

<button onclick="arrived('${id}')">
Arrived
</button>

</div>
`

})

}

function arrived(id){

db.ref("requests/"+id).update({
status:"arrived"
})

requests.innerHTML=`

<div class="card">

Enter customer PIN

<input id="pin">

<button onclick="complete('${id}')">
Complete Service
</button>

</div>

`

}

function complete(id){

let entered =
document.getElementById("pin").value

db.ref("requests/"+id).once("value",snap=>{

let data = snap.val()

if(entered == data.pin){

db.ref("requests/"+id).update({
status:"completed"
})

requests.innerHTML=`
<div class="card">
Service Completed ✅
</div>
`

}else{
alert("Wrong PIN")
}

})

}

</script>

<!-- Bottom Nav -->
<div style="
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
border-top:1px solid #222;
">

<div style="flex:1;text-align:center;padding:12px">
📥 Requests
</div>

<div style="flex:1;text-align:center;padding:12px"
onclick="location='mechanic-activity.html'">
📊 Activity
</div>

<div style="flex:1;text-align:center;padding:12px"
onclick="location='mechanic-account.html'">
👤 Account
</div>

</div>

</body>
</html>
