<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechzzy Mechanic</title>

<style>
body{
margin:0;
font-family:'Inter', sans-serif;
background:#000;
color:#fff;
}

.card{
background:#111;
border:1px solid #222;
border-radius:14px;
padding:16px;
margin:12px;
}

input{
width:100%;
padding:14px;
background:#111;
border:1px solid #222;
color:#fff;
border-radius:10px;
margin-bottom:10px;
}

button{
background:#fff;
color:#000;
border:none;
padding:14px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.secondary{
background:#111;
color:#fff;
border:1px solid #333;
}

.header{
padding:18px;
font-weight:700;
font-size:20px;
border-bottom:1px solid #222;
}

.desc{
color:#aaa;
font-size:14px;
}

.accept{
background:white;
color:black;
}

.reject{
background:#111;
color:white;
border:1px solid #333;
}
</style>
</head>

<body>

<div class="header">

<div>Mechanic</div>

<div class="radiusBox">
<input id="radiusInput" value="10">
<button onclick="saveRadius()">km</button>
</div>

<div id="toggle" class="toggle" onclick="toggleOnline()">Offline</div>

</div>

<div class="container" id="requests"></div>

<audio id="sound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBRb3bcxCdIlOUA74TNw1hdrxfzGv-67DU",
authDomain: "mechzzy.firebaseapp.com",
databaseURL: "https://mechzzy-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "mechzzy"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let myLat=null
let myLng=null

navigator.geolocation.getCurrentPosition(function(pos){
myLat=pos.coords.latitude
myLng=pos.coords.longitude
})

let online=false
let radius=localStorage.getItem("radius") || 10

let mechanicName=localStorage.getItem("mechName")
let mechanicPhone=localStorage.getItem("mechPhone")

if(!mechanicName){
mechanicName=prompt("Enter your name")
mechanicPhone=prompt("Enter your phone")

localStorage.setItem("mechName",mechanicName)
localStorage.setItem("mechPhone",mechanicPhone)
}

function saveRadius(){
radius=document.getElementById("radiusInput").value
localStorage.setItem("radius",radius)
}

function toggleOnline(){

online=!online

if(online){
toggle.innerText="Online"
toggle.classList.add("online")
listenRequests()
}else{
toggle.innerText="Offline"
toggle.classList.remove("online")
requests.innerHTML=""
}

}

function distance(lat1, lon1, lat2, lon2){

var R=6371
var dLat=(lat2-lat1)*Math.PI/180
var dLon=(lon2-lon1)*Math.PI/180

var a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*
Math.sin(dLon/2)

var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
return R*c

}

function listenRequests(){

db.ref("requests").on("value",snap=>{

if(!online) return

requests.innerHTML=""

let list=[]

snap.forEach(child=>{
list.push({
id:child.key,
data:child.val()
})
})

list.reverse()

list.forEach(item=>{

let id=item.id
let data=item.data

if(data.status!="pending") return
if(!data.lat || !data.lng || !myLat || !myLng) return

let d=distance(
myLat,
myLng,
data.lat,
data.lng
)

if(d>radius) return

playSound()

let div=document.createElement("div")
div.className="card"

let timeLeft=15

div.innerHTML=`
<b>${data.vehicle}</b> - ${data.problem}<br>
${data.name} - ${data.phone}
<br>
Distance: ${d.toFixed(1)} km

<div class="timer" id="timer-${id}">
Auto expire in 15s
</div>

<button class="btn accept" onclick="accept('${id}')">
Accept
</button>

<button class="btn reject" onclick="reject('${id}')">
Reject
</button>
`

requests.appendChild(div)

let interval=setInterval(()=>{

timeLeft--

let t=document.getElementById("timer-"+id)
if(t) t.innerText="Auto expire in "+timeLeft+"s"

if(timeLeft<=0){
clearInterval(interval)
div.remove()
}

},1000)

})

})

}

function accept(id){

db.ref("requests/"+id).once("value",snap=>{

let data=snap.val()

if(data.status!="pending"){
alert("Already taken")
return
}

db.ref("requests/"+id).update({
status:"assigned",
mechanicName:mechanicName,
mechanicPhone:mechanicPhone,
mechLat:myLat,
mechLng:myLng
})

})

}

function reject(id){}

function playSound(){
document.getElementById("sound").play()
}

function send(){

let id = Date.now()

// create 4-digit pin
let pin = Math.floor(1000 + Math.random() * 9000)

db.ref("requests/"+id).set({
name:name.value,
phone:phone.value,
vehicle:vehicle.value,
problem:problem.value,
lat:myLat,
lng:myLng,
status:"pending",
pin: pin
})

listen(id)
}

</script>

</body>
</html>
