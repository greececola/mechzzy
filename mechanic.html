<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechzzy Mechanic</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.header{
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1e293b;
}

.toggle{
padding:6px 14px;
border-radius:20px;
background:#1e293b;
cursor:pointer;
}

.online{
background:#22c55e;
}

.container{
padding:15px;
}

.card{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-bottom:12px;
border:1px solid #1e293b;
}

.btn{
padding:10px;
border-radius:8px;
border:none;
margin-top:8px;
cursor:pointer;
width:48%;
}

.accept{
background:#22c55e;
color:white;
}

.reject{
background:#ef4444;
color:white;
float:right;
}

.timer{
font-size:12px;
opacity:.6;
margin-top:5px;
}

.radiusBox{
display:flex;
gap:5px;
}

.radiusBox input{
width:60px;
}
</style>
</head>

<body>

<div class="header">

<div>Mechanic</div>

<div class="radiusBox">
<input id="radiusInput" value="10">
<button onclick="saveRadius()">km</button>
</div>

<div id="toggle" class="toggle" onclick="toggleOnline()">Offline</div>

</div>

<div class="container" id="requests"></div>

<audio id="sound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBRb3bcxCdIlOUA74TNw1hdrxfzGv-67DU",
authDomain: "mechzzy.firebaseapp.com",
databaseURL: "https://mechzzy-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "mechzzy"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let myLat=null
let myLng=null

navigator.geolocation.getCurrentPosition(function(pos){
myLat=pos.coords.latitude
myLng=pos.coords.longitude
})

let online=false
let radius=localStorage.getItem("radius") || 10

let mechanicName=localStorage.getItem("mechName")
let mechanicPhone=localStorage.getItem("mechPhone")

if(!mechanicName){
mechanicName=prompt("Enter your name")
mechanicPhone=prompt("Enter your phone")

localStorage.setItem("mechName",mechanicName)
localStorage.setItem("mechPhone",mechanicPhone)
}

function saveRadius(){
radius=document.getElementById("radiusInput").value
localStorage.setItem("radius",radius)
}

function toggleOnline(){

online=!online

if(online){
toggle.innerText="Online"
toggle.classList.add("online")
listenRequests()
}else{
toggle.innerText="Offline"
toggle.classList.remove("online")
requests.innerHTML=""
}

}

function distance(lat1, lon1, lat2, lon2){

var R=6371
var dLat=(lat2-lat1)*Math.PI/180
var dLon=(lon2-lon1)*Math.PI/180

var a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*
Math.sin(dLon/2)

var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
return R*c

}

function listenRequests(){

db.ref("requests").on("value",snap=>{

if(!online) return

requests.innerHTML=""

let list=[]

snap.forEach(child=>{
list.push({
id:child.key,
data:child.val()
})
})

list.reverse()

list.forEach(item=>{

let id=item.id
let data=item.data

if(data.status!="pending") return
if(!data.lat || !data.lng || !myLat || !myLng) return

let d=distance(
myLat,
myLng,
data.lat,
data.lng
)

if(d>radius) return

playSound()

let div=document.createElement("div")
div.className="card"

let timeLeft=15

div.innerHTML=`
<b>${data.vehicle}</b> - ${data.problem}<br>
${data.name} - ${data.phone}
<br>
Distance: ${d.toFixed(1)} km

<div class="timer" id="timer-${id}">
Auto expire in 15s
</div>

<button class="btn accept" onclick="accept('${id}')">
Accept
</button>

<button class="btn reject" onclick="reject('${id}')">
Reject
</button>
`

requests.appendChild(div)

let interval=setInterval(()=>{

timeLeft--

let t=document.getElementById("timer-"+id)
if(t) t.innerText="Auto expire in "+timeLeft+"s"

if(timeLeft<=0){
clearInterval(interval)
div.remove()
}

},1000)

})

})

}

function accept(id){

db.ref("requests/"+id).once("value",snap=>{

let data=snap.val()

if(data.status!="pending"){
alert("Already taken")
return
}

db.ref("requests/"+id).update({
status:"assigned",
mechanicName:mechanicName,
mechanicPhone:mechanicPhone,
mechLat:myLat,
mechLng:myLng
})

})

}

function reject(id){}

function playSound(){
document.getElementById("sound").play()
}

</script>

</body>
</html>
