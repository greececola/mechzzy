<!DOCTYPE html>
<html>
<head>
  <title>Mechzzy Mechanic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
    }

    .header {
      background: linear-gradient(135deg, #7fb3ff, #60a5fa);
      color: white;
      padding: 18px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
    }

    .sub {
      font-size: 14px;
      color: #64748b;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .accept {
      background: #7fb3ff;
      color: white;
    }

    .cancel {
      background: white;
      color: #3b82f6;
      border: 1px solid #bfdbfe;
      font-weight: 600;
      padding: 12px 18px;
      border-radius: 12px;
    }

    .cancel:hover {
      background: #eff6ff;
    }

   .activeBox {
      background: #e0f2fe;
      padding: 18px;
      border-radius: 16px;
      margin-bottom: 15px;
      border: 1px solid #bfdbfe;
      box-shadow: 0 6px 20px rgba(59,130,246,0.15);
      line-height: 1.6;
      color: #0f172a;
    }

  </style>
</head>

<body>

  <div class="header">🔧 Mechzzy Mechanic</div>

  <div class="container">
    <div id="activeBox"></div>
    <div id="requests"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyBRb3bcxCdIlOUA74TNw1hdrxfzGv-67DU",
      authDomain: "mechzzy.firebaseapp.com",
      databaseURL: "https://mechzzy-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "mechzzy"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    const container = document.getElementById("requests");

    db.ref("requests").on("value", (snapshot) => {

      const data = snapshot.val();
      const activeId = localStorage.getItem("activeRequest");

      if (!data) return;

      // 🔥 ACTIVE JOB
      if (activeId && data[activeId]) {
        const active = data[activeId];

        if (active.status === "assigned") {
          document.getElementById("activeBox").innerHTML = `
            <div class="activeBox">
              🚗 <b>Heading to ${active.name}</b><br>
              📞 ${active.phone}<br><br>
              <button class="btn cancel" onclick="cancelActiveRide()">Cancel Ride</button>
            </div>
          `;
          return;
        }
      }

      document.getElementById("activeBox").innerHTML = "";
      container.innerHTML = "";

      for (let id in data) {
        const req = data[id];

        if (req.status === "cancelled") continue;

        if (req.status === "pending") {
          container.innerHTML += `
            <div class="card">
              <div class="title">${req.problem}</div>
              <div class="sub">${req.vehicle} • ${req.phone}</div>
              <button class="btn accept" onclick="acceptRequest('${id}')">Accept</button>
              <button class="btn cancel" onclick="cancelRequest('${id}')">Cancel</button>
            </div>
          `;
        }
      }
    });

    function acceptRequest(id) {

      if (localStorage.getItem("activeRequest")) {
        alert("⚠️ You are already handling a request!");
        return;
      }

      const name = localStorage.getItem("mechanicName");
      const phone = localStorage.getItem("mechanicPhone");

      const ref = db.ref("requests/" + id);

      ref.transaction((currentData) => {

        if (currentData == null) return;

        if (currentData.status === "pending") {
          currentData.status = "assigned";
          currentData.mechanicName = name;
          currentData.mechanicPhone = phone;
          return currentData;
        }

        return;

      }, (error, committed) => {

        if (error) {
          alert("Error occurred");
        } else if (!committed) {
          alert("❌ Already taken");
        } else {
          localStorage.setItem("activeRequest", id);
          alert("✅ Job accepted");
        }

      });
    }

    function cancelRequest(id) {
      db.ref("requests/" + id).update({
        status: "pending",
        mechanicName: null,
        mechanicPhone: null
      });

      localStorage.removeItem("activeRequest");
    }

    function cancelActiveRide() {
      const id = localStorage.getItem("activeRequest");
      if (!id) return;

      db.ref("requests/" + id).update({
        status: "cancelled"
      });

      localStorage.removeItem("activeRequest");
    }
  </script>

</body>
</html>
