<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Inter;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #222;
}

.status{
margin:15px;
padding:14px;
border-radius:10px;
text-align:center;
font-weight:600;
}

.online{background:#0f5132;}
.offline{background:#333;}

.card{
background:#111;
margin:15px;
padding:18px;
border-radius:14px;
border:1px solid #222;
}

.title{
font-size:14px;
color:#aaa;
margin-bottom:8px;
}

.btn{
background:white;
color:black;
padding:12px;
border-radius:8px;
text-align:center;
margin-top:12px;
font-weight:600;
cursor:pointer;
}

.input{
width:100%;
padding:12px;
background:#000;
border:1px solid #333;
border-radius:8px;
color:white;
margin-top:8px;
}
</style>
</head>

<body>

<div class="header">Mechanic Dashboard</div>

<div id="status" class="status">Checking...</div>

<div class="card" id="jobBox" style="display:none">

<div class="title">🚗 Current Job</div>
<div>Heading to customer</div>

<div class="btn" onclick="arrived()">Arrived</div>

</div>

<div class="card" id="pinBox" style="display:none">

<div class="title">🔐 Verify Customer</div>
<input id="pin" class="input" placeholder="Enter PIN">

<div class="btn" onclick="complete()">Complete Service</div>

</div>

<div class="card" id="doneBox" style="display:none">

✅ Service Completed

</div>

<script>

let online = localStorage.getItem("online") || "false"
let job = localStorage.getItem("job") || "none"

let statusBox = document.getElementById("status")

if(online==="true"){
statusBox.innerText="Online"
statusBox.classList.add("online")
}else{
statusBox.innerText="Offline"
statusBox.classList.add("offline")
}

if(job==="accepted"){
document.getElementById("jobBox").style.display="block"
}

if(job==="arrived"){
document.getElementById("pinBox").style.display="block"
}

if(job==="done"){
document.getElementById("doneBox").style.display="block"
}

function arrived(){
localStorage.setItem("job","arrived")
location.reload()
}

function complete(){
let pin=document.getElementById("pin").value

if(pin==="9451"){
localStorage.setItem("job","done")
location.reload()
}else{
alert("Wrong PIN")
}
}

</script>

</body>
</html>
