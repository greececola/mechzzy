<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Inter;
}

/* smooth */
*{transition:all 0.25s ease;}

.header{
padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #222;
}

.status{
margin:15px;
padding:14px;
border-radius:12px;
text-align:center;
font-weight:600;
cursor:pointer;
}

.online{background:#0f5132;}
.offline{background:#333;}

.card{
background:#111;
margin:15px;
padding:18px;
border-radius:16px;
border:1px solid #222;
}

.title{
color:#aaa;
font-size:14px;
margin-bottom:8px;
}

.btn{
background:white;
color:black;
padding:12px;
border-radius:10px;
text-align:center;
margin-top:12px;
font-weight:600;
cursor:pointer;
}

.input{
width:100%;
padding:12px;
background:#000;
border:1px solid #333;
border-radius:10px;
color:white;
margin-top:8px;
}
</style>
</head>

<body>

<div class="header">Mechanic Dashboard</div>

<div id="status" class="status"></div>

<div class="card" id="jobBox" style="display:none">
<div class="title">Current Job</div>
<div>Heading to customer</div>
<div class="btn" onclick="arrived()">Arrived</div>
</div>

<div class="card" id="pinBox" style="display:none">
<div class="title">Enter Customer PIN</div>
<input id="pin" class="input" placeholder="Enter PIN">
<div class="btn" onclick="complete()">Complete Service</div>
</div>

<div class="card" id="doneBox" style="display:none">
✅ Service Completed
</div>

<script>

// ROLE
if(localStorage.getItem("role")!=="mechanic"){
location.href="login.html"
}

// DEFAULTS
let online = localStorage.getItem("online") || "true"
let job = localStorage.getItem("job") || "none"

localStorage.setItem("online",online)
localStorage.setItem("job",job)

let status = document.getElementById("status")

// STATUS
if(online==="true"){
status.innerText="🟢 Online"
status.classList.add("online")
}else{
status.innerText="⚫ Offline"
status.classList.add("offline")
}

// RESET
jobBox.style.display="none"
pinBox.style.display="none"
doneBox.style.display="none"

// SHOW STATE
if(job==="accepted") jobBox.style.display="block"
if(job==="arrived") pinBox.style.display="block"
if(job==="done") doneBox.style.display="block"

// ACTIONS
function arrived(){
localStorage.setItem("job","arrived")
location.reload()
}

function complete(){
let pin=document.getElementById("pin").value

if(pin==="9451"){
localStorage.setItem("job","done")
location.reload()
}else{
alert("Wrong PIN")
}
}

</script>

</body>
</html>
