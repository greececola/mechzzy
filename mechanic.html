<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Inter;
}

.header{
padding:20px;
font-size:22px;
border-bottom:1px solid #222;
}

.card{
background:#111;
margin:15px;
padding:18px;
border-radius:14px;
border:1px solid #222;
}

.btn{
background:white;
color:black;
padding:12px;
border-radius:10px;
text-align:center;
margin-top:12px;
font-weight:600;
cursor:pointer;
}

.input{
width:100%;
padding:12px;
background:#000;
border:1px solid #333;
border-radius:10px;
color:white;
margin-top:8px;
}
</style>
</head>

<body>

<div class="header">Mechanic Dashboard</div>

<div id="requests"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

let mechanicName = localStorage.getItem("mechanicName")
let mechanicPhone = localStorage.getItem("mechanicPhone")

let currentId = null

// 🔥 LISTEN REQUESTS
db.ref("requests").on("value",snap=>{

requests.innerHTML=""

snap.forEach(child=>{

let id = child.key
let d = child.val()

// SHOW PENDING
if(d.status==="pending"){

requests.innerHTML+=`
<div class="card">
<b>${d.vehicle}</b><br>
Issue: ${d.problem}
<div class="btn" onclick="accept('${id}')">Accept</div>
</div>
`

}

// SHOW ACCEPTED (THIS MECHANIC ONLY)
if(d.status==="accepted" && d.mechanicName===mechanicName){

currentId = id

requests.innerHTML=`
<div class="card">
Heading to customer...

<div class="btn" onclick="arrived()">Arrived</div>
</div>
`

}

// SHOW ARRIVED
if(d.status==="arrived" && d.mechanicName===mechanicName){

currentId = id

requests.innerHTML=`
<div class="card">
Enter Customer PIN
<input id="pin" class="input">

<div class="btn" onclick="complete()">Complete</div>
</div>
`

}

// SHOW DONE
if(d.status==="completed" && d.mechanicName===mechanicName){

requests.innerHTML=`
<div class="card">
✅ Service Completed
</div>
`

}

})

})

// ACCEPT
function accept(id){

db.ref("requests/"+id).update({
status:"accepted",
mechanicName:mechanicName,
mechanicPhone:mechanicPhone
})

}

// ARRIVED
function arrived(){

db.ref("requests/"+currentId).update({
status:"arrived"
})

}

// COMPLETE
function complete(){

let entered = document.getElementById("pin").value

db.ref("requests/"+currentId).once("value",snap=>{

let d = snap.val()

if(entered == d.pin){

db.ref("requests/"+currentId).update({
status:"completed"
})

}else{
alert("Wrong PIN")
}

})

}

</script>

</body>
</html>
