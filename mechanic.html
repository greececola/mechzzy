<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
padding-bottom:70px;
line-height:1.5;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
letter-spacing:0.5px;
border-bottom:1px solid #1a1a1a;

/* optional */
background:#000;
position:sticky;
top:0;
z-index:10;
}

/* status toggle */
.status{
margin:15px;
padding:14px;
border-radius:12px;
text-align:center;
font-weight:600;
cursor:pointer;
}

.online{background:#0f5132;}
.offline{background:#333;}

.card{
background: linear-gradient(145deg, #111, #0a0a0a);
margin:15px;
padding:18px;
border-radius:16px;

/* subtle border */
border:1px solid #1f1f1f;

/* premium depth */
box-shadow: 
0 4px 20px rgba(0,0,0,0.6),
inset 0 0 0 1px rgba(255,255,255,0.02);

}

/* slight lift on hover/touch */
.card:active{
transform: scale(0.98);
}

.btn{
background:white;
color:black;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:600;
cursor:pointer;

/* NEW */
/* Smooth feel */
*{
transition: all 0.25s ease;
}

/* Fade animation */
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Spin loader */
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
}

.btn:active{
transform: scale(0.95);
opacity:0.85;
}

.input{
width:100%;
padding:12px;
background:#000;
border:1px solid #333;
border-radius:10px;
color:white;
margin-top:10px;
}

/* bottom nav */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:13px;
cursor:pointer;
}

.tab.active{
color:#fff;
font-weight:600;
}
/* section titles */
.title{
font-size:15px;
color:#aaa;
margin-bottom:8px;
}

/* main text */
.value{
font-size:16px;
font-weight:500;
}

/* small text */
.sub{
font-size:13px;
color:#777;
}

/* spacing improvement */
.section{
margin-top:22px;
}

/* 🔥 UNIVERSAL CLICK FEEDBACK */

button, .card, .option, .tab, .btn {
transition: all 0.15s ease;
cursor: pointer;
}

/* TAP EFFECT */
button:active, 
.card:active, 
.option:active, 
.tab:active, 
.btn:active {
transform: scale(0.96);
opacity: 0.85;
}

/* HOVER (for laptop) */
button:hover, 
.card:hover, 
.option:hover {
background:#1a1a1a;
}

</style>
</head>

<body>

    <audio id="newRequestSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<div class="header">Mechanic Dashboard</div>

<div id="status" class="status"></div>

<div id="content"></div>

<div class="bottom">
<div class="tab active">Requests</div>
<div class="tab" onclick="location='mechanic-activity.html'">Activity</div>
<div class="tab" onclick="location='mechanic-account.html'">Account</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

// ROLE CHECK
if(localStorage.getItem("role") !== "mechanic"){
location.href="login.html"
}

// USER DATA
let mechanicName = localStorage.getItem("mechanicName")
let mechanicPhone = localStorage.getItem("mechanicPhone")

// ONLINE STATE
let online = localStorage.getItem("online") || "false"
localStorage.setItem("online", online)

let statusBox = document.getElementById("status")

function updateStatus(){
if(online==="true"){
statusBox.innerText="🟢 Online"
statusBox.className="status online"
}else{
statusBox.innerText="⚫ Offline"
statusBox.className="status offline"
}
}

statusBox.onclick=()=>{
online = (online==="true") ? "false" : "true"
localStorage.setItem("online",online)
updateStatus()
}

updateStatus()

let currentId = null
let content = document.getElementById("content")

// 🔥 FIREBASE LISTENER
db.ref("requests").on("value",snap=>{

content.innerHTML=""

let hasRequest = false

snap.forEach(child=>{

let id = child.key
let d = child.val()

// SHOW ONLY WHEN ONLINE
if(online !== "true") return

// NEW REQUEST
if(d.status==="pending"){

// 🔔 play sound once
if(!window.soundPlayed){
let sound = document.getElementById("newRequestSound")
if(sound){
sound.play().catch(()=>{})
}
window.soundPlayed = true
}

hasRequest = true

content.innerHTML += `
<div class="card">
<b>${d.vehicle}</b><br>
Issue: ${d.problem}

<div class="btn" onclick="accept('${id}')">Accept</div>
</div>
`
}

// ACCEPTED
if(d.status==="accepted" && d.mechanicName===mechanicName){

hasRequest = true
currentId = id

content.innerHTML = `
<div class="card">
<div style="font-size:16px;font-weight:600;margin-bottom:6px;">
🚗 Heading to customer
</div>

<div style="color:#aaa;font-size:14px;">
Follow route & reach safely
</div>

<div class="btn" onclick="arrived()">Arrived</div>
</div>
`
}

// ARRIVED
if(d.status==="arrived" && d.mechanicName===mechanicName){

hasRequest = true
currentId = id

content.innerHTML = `
<div class="card">
🔐 Enter Customer PIN

<input id="pin" class="input">

<div class="btn" onclick="complete()">Complete Service</div>
</div>
`
}

// COMPLETED
if(d.status==="completed" && d.mechanicName===mechanicName){

hasRequest = true

content.innerHTML = `
<div class="card">
✅ Service Completed
</div>
`
}

})

// EMPTY STATE
if(!hasRequest){
content.innerHTML = `
<div class="card fade" style="text-align:center">

<div style="font-size:16px;margin-bottom:6px">
No requests nearby
</div>

<div style="color:#777;font-size:13px">
Stay online to receive jobs
</div>

</div>
`
}

})

// ACTIONS
function accept(id){
db.ref("requests/"+id).update({
status:"accepted",
mechanicName:mechanicName,
mechanicPhone:mechanicPhone
})
}

function arrived(){
db.ref("requests/"+currentId).update({
status:"arrived"
})
}

function complete(){

let entered = document.getElementById("pin").value

db.ref("requests/"+currentId).once("value",snap=>{

let d = snap.val()

if(entered == d.pin){
db.ref("requests/"+currentId).update({
status:"completed"
})
}else{
alert("Wrong PIN")
}

})

}

</script>

<audio id="acceptSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

</body>
</html>
