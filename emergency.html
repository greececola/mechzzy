<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emergency - MECHZZY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:'Inter', sans-serif;
padding-bottom:100px;
}

/* HEADER */
.header{
padding:18px;
border-bottom:1px solid #1a1a1a;
}

.title{
font-size:20px;
font-weight:600;
}

.sub{
font-size:13px;
color:#888;
margin-top:4px;
}

/* SECTION */
.section{
padding:16px;
}

.label{
font-size:13px;
color:#aaa;
margin-bottom:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.option{
background:#111;
border:1px solid #222;
padding:16px;
border-radius:14px;
text-align:center;
font-size:15px;
}

.option.active{
background:#fff;
color:#000;
border:1px solid #fff;
transform:scale(1.04);
}

.option:active{
transform:scale(0.95);
}

/* UPLOAD */
.upload{
background:#111;
border:1px dashed #333;
padding:20px;
text-align:center;
border-radius:14px;
margin-top:10px;
font-size:13px;
color:#aaa;
}

.preview{
width:100%;
border-radius:12px;
margin-top:10px;
}

/* BUTTON */
.button{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
color:#000;
padding:18px;
text-align:center;
font-size:18px;
font-weight:700;
border-top-left-radius:18px;
border-top-right-radius:18px;
box-shadow:0 -5px 20px rgba(0,0,0,0.6);
z-index:1000;
}

.button.loading{
background:#555;
color:#ccc;
}

/* NAV */
.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:12px;
cursor:pointer;
}

.tab.active{
color:#fff;
font-weight:600;
}

</style>
</head>

<body>

<div class="header">
<div class="title">Emergency Help</div>
<div class="sub">Get a mechanic instantly</div>
</div>

<div class="section">
<div class="label">Select Vehicle</div>

<div class="grid">
<div class="option" onclick="selectVehicle(this,'Car')">🚗 Car</div>
<div class="option" onclick="selectVehicle(this,'Bike')">🏍️ Bike</div>
<div class="option" onclick="selectVehicle(this,'Scooty')">🛵 Scooty</div>
<div class="option" onclick="selectVehicle(this,'Other')">⚙️ Other</div>
</div>
</div>

<div class="section">
<div class="label">What’s the issue?</div>

<div class="grid">
<div class="option" onclick="selectProblem(this,'Battery')">🔋 Battery</div>
<div class="option" onclick="selectProblem(this,'Puncture')">🛞 Puncture</div>
<div class="option" onclick="selectProblem(this,'Fuel')">⛽ Fuel</div>
<div class="option" onclick="selectProblem(this,'Not Starting')">⚙️ Not Starting</div>
<div class="option" onclick="selectProblem(this,'Overheat')">🔥 Overheat</div>
<div class="option" onclick="selectProblem(this,'Accident')">💥 Accident</div>
</div>
</div>

<div class="section">
<div class="label">Add Photo (optional)</div>

<div class="upload" onclick="pickImage()">📷 Tap to upload</div>

<input type="file" id="file" accept="image/*" style="display:none">
<img id="preview" class="preview" style="display:none">
</div>

<div class="button" id="btn" onclick="requestMechanic()">
🚀 Get Mechanic Now
</div>

<div class="bottom">
<div class="tab" onclick="location.href='customer-home.html'">🏠<br>Home</div>
<div class="tab" onclick="location.href='customer-activity.html'">📄<br>Activity</div>
<div class="tab active">🚨<br>Emergency</div>
<div class="tab" onclick="location.href='customer-account.html'">👤<br>Account</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

let vehicle = ""
let problem = ""
let photo = ""
let lat = null
let lng = null

function selectVehicle(el,val){
document.querySelectorAll(".section")[0]
.querySelectorAll(".option")
.forEach(o=>o.classList.remove("active"))

el.classList.add("active")
vehicle = val

updateButton()
}

function selectProblem(el,val){
document.querySelectorAll(".section")[1]
.querySelectorAll(".option")
.forEach(o=>o.classList.remove("active"))

el.classList.add("active")
problem = val

updateButton()
}

function pickImage(){
document.getElementById("file").click()
}

file.onchange = function(e){
let reader = new FileReader()
reader.onload = function(){
photo = reader.result
preview.src = photo
preview.style.display="block"
}
reader.readAsDataURL(e.target.files[0])
}

// 📍 location
navigator.geolocation.getCurrentPosition(pos=>{
lat = pos.coords.latitude
lng = pos.coords.longitude
}, ()=>{
alert("Location permission needed")
})

// 🚀 request
function requestMechanic(){

if(!vehicle){
alert("Select vehicle")
return
}

if(!problem){
alert("Select problem")
return
}

if(!lat || !lng){
alert("Getting location... try again")
return
}

// loading UI
btn.innerText = "Finding mechanic..."
btn.classList.add("loading")

let id = Date.now()
let pin = Math.floor(1000 + Math.random()*9000)

db.ref("requests/"+id).set({
vehicle:vehicle,
problem:problem,
photo:photo,
lat:lat,
lng:lng,
status:"searching",
pin:pin,
created:Date.now()
})

// history
let history = JSON.parse(localStorage.getItem("history") || "[]")
history.push(id)
localStorage.setItem("history", JSON.stringify(history))

localStorage.setItem("requestId", id)
localStorage.setItem("pin", pin)
localStorage.setItem("vehicle", vehicle)
localStorage.setItem("issue", problem)

location.href = "searching.html"
}

function updateButton(){

if(vehicle && problem){
btn.innerText = "🚀 Request Mechanic Now"
}
else if(vehicle){
btn.innerText = "Select issue"
}
else{
btn.innerText = "Select vehicle"
}

}

</script>

</body>
</html>
