<!DOCTYPE html>
<html>
<head>
<title>Mechzzy Emergency</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.header{
padding:18px;
font-size:20px;
font-weight:700;
text-align:center;
background:#020617;
border-bottom:1px solid #1e293b;
}

.container{
padding:18px;
}

.card{
background:#0f172a;
padding:18px;
border-radius:16px;
margin-bottom:15px;
border:1px solid #1e293b;
}

.title{
font-size:16px;
margin-bottom:12px;
}

input,select{
width:100%;
padding:14px;
margin-bottom:10px;
border-radius:10px;
border:none;
background:#020617;
color:white;
border:1px solid #1e293b;
}

.btn{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-weight:600;
cursor:pointer;
}

.primary{
background:#ef4444;
color:white;
}

.cancel{
background:#1e293b;
color:white;
margin-top:10px;
}

.status{
margin-top:15px;
padding:14px;
border-radius:12px;
background:#020617;
border:1px solid #1e293b;
}

.hidden{
display:none;
}

.loader{
border:4px solid #1e293b;
border-top:4px solid #22c55e;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
margin-bottom:10px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.center{
text-align:center;
}
</style>
</head>

<body>

<div class="header">
🚨 Emergency Help
</div>

<div class="container">

<div class="card" id="formBox">

<div class="title">Request nearby mechanic</div>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<select id="vehicle">
<option value="">Vehicle</option>
<option>Bike</option>
<option>Car</option>
</select>

<input id="problem" placeholder="Problem">

<button class="btn primary" onclick="submitRequest()">
Find Mechanic
</button>

</div>

<div class="card hidden center" id="searchBox">

<div class="loader"></div>
<div>Searching nearby mechanic...</div>

<button class="btn cancel" onclick="cancelRequest()">
Cancel Request
</button>

</div>

<div id="statusBox" class="status hidden"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBRb3bcxCdIlOUA74TNw1hdrxfzGv-67DU",
authDomain: "mechzzy.firebaseapp.com",
databaseURL: "https://mechzzy-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "mechzzy"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

function submitRequest(){

const name = nameInput()
const phone = phoneInput()
const vehicle = vehicleInput()
const problem = problemInput()

if(!name || !phone || !vehicle || !problem){
alert("Please fill all fields")
return
}

navigator.geolocation.getCurrentPosition(function(pos){

const lat = pos.coords.latitude
const lng = pos.coords.longitude

saveRequest(lat,lng)

})

const id = Date.now()

db.ref("requests/" + id).set({
name:name,
phone:phone,
vehicle:vehicle,
problem:problem,
status:"pending",
createdAt:Date.now()
})

localStorage.setItem("myRequest", id)

formBox.classList.add("hidden")
searchBox.classList.remove("hidden")

showStatus()

}

function showStatus(){

const id = localStorage.getItem("myRequest")
if(!id) return

db.ref("requests/" + id).on("value", snap=>{

const data = snap.val()
if(!data) return

statusBox.classList.remove("hidden")

if(data.status=="pending"){
statusBox.innerHTML="Searching for mechanic..."
}

if(data.status=="assigned"){
searchBox.classList.add("hidden")

statusBox.innerHTML=
data.mechanicName + " is on the way<br>" +
data.mechanicPhone
}

if(data.status=="cancelled"){
searchBox.classList.add("hidden")
statusBox.innerHTML="Request cancelled"
}

})

}

function cancelRequest(){

const id = localStorage.getItem("myRequest")
if(!id) return

db.ref("requests/"+id).update({
status:"cancelled"
})

localStorage.removeItem("myRequest")

searchBox.classList.add("hidden")
formBox.classList.remove("hidden")

}

function saveRequest(lat,lng){

const id = Date.now()

db.ref("requests/" + id).set({
name:nameInput(),
phone:phoneInput(),
vehicle:vehicleInput(),
problem:problemInput(),
status:"pending",
lat:lat,
lng:lng,
createdAt:Date.now()
})

localStorage.setItem("myRequest", id)

}

function nameInput(){return document.getElementById("name").value}
function phoneInput(){return document.getElementById("phone").value}
function vehicleInput(){return document.getElementById("vehicle").value}
function problemInput(){return document.getElementById("problem").value}

showStatus()

</script>

</body>
</html>
