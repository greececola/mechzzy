<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#3B2A21;
color:#f5f1ea;
}

.container{
padding:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:10px;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
background:#d2b48c;
border:none;
border-radius:10px;
font-weight:600;
}

.status{
margin-top:20px;
background:#4a352a;
padding:15px;
border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="vehicle" placeholder="Vehicle">
<input id="problem" placeholder="Problem">

<button onclick="send()">Request Mechanic</button>

<div id="status" class="status"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"mechzzy.firebaseapp.com",
databaseURL:"https://mechzzy-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"mechzzy"
}

firebase.initializeApp(firebaseConfig)
var db=firebase.database()

let myLat,myLng

navigator.geolocation.getCurrentPosition(pos=>{
myLat=pos.coords.latitude
myLng=pos.coords.longitude
})

function send(){

let id=Date.now()

db.ref("requests/"+id).set({
name:name.value,
phone:phone.value,
vehicle:vehicle.value,
problem:problem.value,
lat:myLat,
lng:myLng,
status:"pending"
})

listen(id)
}

function listen(id){

db.ref("requests/"+id).on("value",snap=>{

let data=snap.val()

if(data.status=="pending"){
status.innerHTML="Searching nearby mechanic..."
}

if(data.status=="assigned"){

let d = distance(
myLat,
myLng,
data.mechLat,
data.mechLng
)

let eta = Math.round((d/30)*60)

status.innerHTML=
"Mechanic assigned<br>"+
data.mechanicName+"<br>"+
"Arriving in "+eta+" mins"

}

})

}

function distance(lat1, lon1, lat2, lon2){

var R=6371
var dLat=(lat2-lat1)*Math.PI/180
var dLon=(lon2-lon1)*Math.PI/180

var a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*
Math.sin(dLon/2)

var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
return R*c

}

</script>

</body>
</html>
