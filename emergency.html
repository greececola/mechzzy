<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Inter', sans-serif;
background:#000;
color:#fff;
}

.card{
background:#111;
border:1px solid #222;
border-radius:14px;
padding:16px;
margin:12px;
}

input{
width:100%;
padding:14px;
background:#111;
border:1px solid #222;
color:#fff;
border-radius:10px;
margin-bottom:10px;
}

button{
background:#fff;
color:#000;
border:none;
padding:14px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.secondary{
background:#111;
color:#fff;
border:1px solid #333;
}

.header{
padding:18px;
font-weight:700;
font-size:20px;
border-bottom:1px solid #222;
}

.desc{
color:#aaa;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="vehicle" placeholder="Vehicle">
<input id="problem" placeholder="Problem">

<button onclick="send()">Request Mechanic</button>

<div id="status" class="status"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"mechzzy.firebaseapp.com",
databaseURL:"https://mechzzy-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"mechzzy"
}

firebase.initializeApp(firebaseConfig)
var db=firebase.database()

let myLat,myLng

navigator.geolocation.getCurrentPosition(pos=>{
myLat=pos.coords.latitude
myLng=pos.coords.longitude
})

function send(){

let id = Date.now()

// create 4-digit pin
let pin = Math.floor(1000 + Math.random() * 9000)

db.ref("requests/"+id).set({
name:name.value,
phone:phone.value,
vehicle:vehicle.value,
problem:problem.value,
lat:myLat,
lng:myLng,
status:"pending",
pin: pin
})

listen(id)
}

function listen(id){

db.ref("requests/"+id).on("value",snap=>{

let data=snap.val()

if(data.status=="pending"){
status.innerHTML="Searching nearby mechanic..."
}

if(data.status=="assigned"){

let d = distance(
myLat,
myLng,
data.mechLat,
data.mechLng
)

let eta = Math.round((d/30)*60)

status.innerHTML =
"Mechanic assigned<br>" +
data.mechanicName + "<br><br>" +
"Share PIN: <b>" + data.pin + "</b><br>" +
"Arriving in " + eta + " mins"

}

})

}

function distance(lat1, lon1, lat2, lon2){

var R=6371
var dLat=(lat2-lat1)*Math.PI/180
var dLon=(lon2-lon1)*Math.PI/180

var a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*
Math.sin(dLon/2)

var c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
return R*c

}

</script>

</body>
</html>
