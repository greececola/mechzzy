<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Inter;
}

.container{
padding:16px;
}

input{
width:100%;
padding:14px;
margin-bottom:10px;
background:#111;
border:1px solid #222;
color:white;
border-radius:10px;
}

button{
background:white;
color:black;
padding:14px;
border:none;
border-radius:10px;
font-weight:600;
}

.status{
margin-top:20px;
background:#111;
padding:15px;
border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="vehicle" placeholder="Vehicle">
<input id="problem" placeholder="Problem">

<button onclick="sendRequest()">Request Mechanic</button>

<div id="status" class="status"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "mechzzy.firebaseapp.com",
databaseURL: "https://mechzzy-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "mechzzy"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let myLat,myLng

navigator.geolocation.getCurrentPosition(pos=>{
myLat=pos.coords.latitude
myLng=pos.coords.longitude
})

function sendRequest(){

let id = Date.now()

let pin = Math.floor(1000 + Math.random()*9000)

db.ref("requests/"+id).set({
name:name.value,
phone:phone.value,
vehicle:vehicle.value,
problem:problem.value,
lat:myLat,
lng:myLng,
status:"pending",
pin:pin
})

status.innerHTML="Searching mechanic... PIN: "+pin

}

</script>

</body>
</html>
