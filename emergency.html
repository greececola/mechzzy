<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emergency</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
padding-bottom:100px;
line-height:1.5;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
letter-spacing:0.5px;
border-bottom:1px solid #1a1a1a;
background:#000;
position:sticky;
top:0;
z-index:10;

}

.section{
padding:16px;
margin-top:22px;
}

.title{
font-size:15px;
margin-bottom:8px;
color:#aaa;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background: linear-gradient(145deg, #111, #0a0a0a);
margin:15px;
padding:18px;
border-radius:16px;

/* subtle border */
border:1px solid #1f1f1f;

/* premium depth */
box-shadow: 
0 4px 20px rgba(0,0,0,0.6),
inset 0 0 0 1px rgba(255,255,255,0.02);
}

/* slight lift on hover/touch */
.card:active{
transform: scale(0.98);
}

.upload{
background:#111;
border:1px dashed #444;
padding:20px;
text-align:center;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.preview{
width:100%;
border-radius:10px;
margin-top:10px;
}

.btn{
background:white;
color:black;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:600;
cursor:pointer;

/* Smooth feel */
*{
transition: all 0.25s ease;
}

/* Fade animation */
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Spin loader */
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
}

.btn:active{
transform: scale(0.95);
opacity:0.85;
}

/* main text */
.value{
font-size:16px;
font-weight:500;
}

/* small text */
.sub{
font-size:13px;
color:#777;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #1a1a1a;
}

.tab{
flex:1;
text-align:center;
padding:12px;
color:#777;
font-size:13px;
cursor:pointer;
}

.tab.active{
color:#fff;
font-weight:600;
}

</style>
</head>

<body>

<div class="header">
<div style="font-size:22px;font-weight:600">Emergency</div>
<div style="color:#aaa;font-size:13px;margin-top:4px">
Find nearby mechanic instantly
</div>
</div>

<div class="section">
<div class="title">Select Vehicle</div>

<div class="grid">
<div class="card" onclick="selectVehicle(this,'Car')">🚗 Car</div>
<div class="card" onclick="selectVehicle(this,'Bike')">🏍 Bike</div>
<div class="card" onclick="selectVehicle(this,'Scooty')">🛵 Scooty</div>
<div class="card" onclick="selectVehicle(this,'Other')">🚙 Other</div>
</div>
</div>

<div class="section">
<div class="title">What's the issue?</div>

<div class="grid">
<div class="card" onclick="selectProblem(this,'Battery')">🔋 Battery</div>
<div class="card" onclick="selectProblem(this,'Puncture')">🛞 Puncture</div>
<div class="card" onclick="selectProblem(this,'Fuel')">⛽ Fuel</div>
<div class="card" onclick="selectProblem(this,'Not Starting')">⚙️ Not Starting</div>
<div class="card" onclick="selectProblem(this,'Overheat')">🔥 Overheat</div>
<div class="card" onclick="selectProblem(this,'Accident')">💥 Accident</div>
</div>
</div>

<div class="section">
<div class="title">Upload Vehicle Photo (optional)</div>

<div class="upload" onclick="pickImage()">
📷 Tap to add photo
</div>

<img id="preview" class="preview" style="display:none"/>
<input type="file" id="file" accept="image/*" style="display:none">
</div>

<div class="button" onclick="requestMechanic()">
Request Mechanic
</div>

<!-- ✅ ROLE PROTECTION -->
<script>
let role = localStorage.getItem("role")

if(role !== "customer"){
location.href = "login.html"
}
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBRb3bcxCdIlOUA74TNw1hdrxfzGv-67DU",
authDomain: "mechzzy.firebaseapp.com",
databaseURL: "https://mechzzy-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "mechzzy"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let vehicle = ""
let problem = ""
let photo = ""

function selectVehicle(el,val){

document.querySelectorAll(".grid")[0]
.querySelectorAll(".card")
.forEach(c=>c.classList.remove("active"))

el.classList.add("active")
vehicle = val
}

function selectProblem(el,val){

document.querySelectorAll(".grid")[1]
.querySelectorAll(".card")
.forEach(c=>c.classList.remove("active"))

el.classList.add("active")
problem = val
}

function pickImage(){
document.getElementById("file").click()
}

document.getElementById("file").addEventListener("change",function(e){

let reader = new FileReader()

reader.onload=function(){
photo = reader.result
preview.src = photo
preview.style.display="block"
}

reader.readAsDataURL(e.target.files[0])

})

navigator.geolocation.getCurrentPosition(pos=>{
window.lat = pos.coords.latitude
window.lng = pos.coords.longitude
})

function requestMechanic(){

if(!vehicle){
alert("Select vehicle")
return
}

if(!problem){
alert("Select problem")
return
}

let id = Date.now()
let pin = Math.floor(1000 + Math.random()*9000)

// save request
db.ref("requests/"+id).set({
vehicle:vehicle,
problem:problem,
photo:photo || "",
lat:window.lat,
lng:window.lng,
status:"pending",
pin:pin,
created:Date.now()
})

// save history
let history =
JSON.parse(localStorage.getItem("history") || "[]")

history.push(id)

localStorage.setItem("history", JSON.stringify(history))

// save locally
localStorage.setItem("requestId", id)
localStorage.setItem("pin", pin)
localStorage.setItem("vehicle", vehicle)
localStorage.setItem("issue", problem)

// go next
window.location.href = "searching.html"

}

</script>

</body>
</html>
