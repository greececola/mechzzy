<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
padding:15px;
}

input{
width:100%;
padding:14px;
margin-bottom:10px;
background:#111;
border:1px solid #222;
color:white;
border-radius:10px;
}

button{
padding:12px 20px;
background:white;
color:black;
border:none;
border-radius:10px;
cursor:pointer;
}

.status{
margin-top:20px;
background:#111;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="vehicle" placeholder="Vehicle">
<input id="problem" placeholder="Problem">

<button onclick="sendRequest()">Request Mechanic</button>

<div id="status" class="status"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

var firebaseConfig = {
apiKey: "AIzaSyBRb3bcxCdIlOUA74TNw1hdrxfzGv-67DU",
authDomain: "mechzzy.firebaseapp.com",
databaseURL: "https://mechzzy-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "mechzzy"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let myLat=null
let myLng=null

navigator.geolocation.getCurrentPosition(pos=>{
myLat=pos.coords.latitude
myLng=pos.coords.longitude
})

function distance(lat1, lon1, lat2, lon2){

var R = 6371
var dLat = (lat2-lat1) * Math.PI/180
var dLon = (lon2-lon1) * Math.PI/180

var a =
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*
Math.sin(dLon/2)

var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))
return R * c
}

function sendRequest(){

let id=Date.now()
let pin=Math.floor(1000+Math.random()*9000)

db.ref("requests/"+id).set({
name:name.value,
phone:phone.value,
vehicle:vehicle.value,
problem:problem.value,
lat:myLat,
lng:myLng,
status:"pending",
pin:pin
})

status.innerHTML=
"Searching mechanic...<br>Your PIN: <b>"+pin+"</b>"

listen(id)
}

function listen(id){

db.ref("requests/"+id).on("value",snap=>{

let data=snap.val()
if(!data) return

if(data.status=="pending"){
status.innerHTML=
"Searching mechanic...<br>Your PIN: <b>"+data.pin+"</b>"
}

if(data.status=="assigned"){

let eta="calculating..."

if(data.mechLat){

let d=distance(
myLat,
myLng,
data.mechLat,
data.mechLng
)

eta=Math.round((d/30)*60)+" mins"
}

status.innerHTML=`
<b>Mechanic Assigned</b><br><br>

Name: ${data.mechanicName}<br>
Phone: ${data.mechanicPhone}<br><br>

ETA: ${eta}<br><br>

Share PIN: <b>${data.pin}</b>
`
}

if(data.status=="completed"){
status.innerHTML="Service completed ✅"
}

})
}

</script>

</body>
</html>
