<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activity</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
padding-bottom:70px;
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #1a1a1a;
}

.card{
background:#111;
margin:15px;
padding:18px;
border-radius:16px;
border:1px solid #1f1f1f;
}

.status{
margin-top:8px;
font-size:13px;
color:#aaa;
}

.rating{
margin-top:8px;
font-size:13px;
color:#ccc;
}

.empty{
text-align:center;
margin-top:40px;
color:#777;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#000;
border-top:1px solid #222;
}

.nav-item{
flex:1;
text-align:center;
padding:10px;
font-size:12px;
color:#aaa;
}

.nav-item.active{
color:#fff;
font-weight:600;
}
</style>
</head>

<body>

<div class="header">Activity</div>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<script>

// role check
let role = localStorage.getItem("role")
if(role !== "customer"){
location.href = "login.html"
}

// get container
let list = document.getElementById("list")

// loading state
list.innerHTML = `<div class="empty">Loading...</div>`

// history
let history = JSON.parse(localStorage.getItem("history") || "[]")

// empty case
if(history.length === 0){
list.innerHTML = `
<div class="empty">
No requests yet<br><br>
<span style="font-size:13px;color:#555;">
Your past services will appear here
</span>
</div>
`
}else{

list.innerHTML = ""

// latest first
history.slice().reverse().forEach(id=>{

db.ref("requests/"+id).once("value",snap=>{

let d = snap.val()
if(!d) return

list.innerHTML += `
<div class="card">

<b>${d.vehicle || "-"}</b><br>
Issue: ${d.problem || "-"}

<div class="status">
Status: ${formatStatus(d.status)}
</div>

${
d.rating ? `<div class="rating">⭐ ${d.rating} rating</div>` : ""
}

</div>
`

})

})

}

// format status
function formatStatus(s){

if(s==="completed") return "Completed ✅"
if(s==="accepted") return "On the way 🚗"
if(s==="arrived") return "Arrived 📍"
if(s==="pending") return "Searching ⏳"
if(s==="cancelled") return "Cancelled ❌"

return s

}

// navigation
function go(page){
location.href = page
}

</script>

<div class="bottom-nav">
<div class="nav-item" onclick="go('customer-home.html')">🏠<br>Home</div>
<div class="nav-item active">📄<br>Activity</div>
<div class="nav-item" onclick="go('services.html')">🛠️<br>Services</div>
<div class="nav-item" onclick="go('customer-account.html')">👤<br>Account</div>
</div>

</body>
</html>
